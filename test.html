<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RecipeFlow - Test</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; padding: 2rem; }
        li { padding: 0.5rem 0; border-bottom: 1px solid #ddd; }
    </style>
</head>
<body>
    <div id="root">Loading...</div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const SUPABASE_URL = 'YOUR_RECIPEFLOW_SUPABASE_URL';
        const SUPABASE_KEY = 'YOUR_RECIPEFLOW_ANON_KEY';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function App() {
            const [recipes, setRecipes] = useState([]);
            const [status, setStatus] = useState('loading');

            useEffect(() => {
                supabase.from('recipes').select('id, name').then((result) => {
                    if (result.error) {
                        setStatus('error: ' + result.error.message);
                    } else {
                        setRecipes(result.data);
                        setStatus('loaded');
                    }
                });
            }, []);

            return (
                <div>
                    <h1>Recipe List Test</h1>
                    <p>Status: {status}</p>
                    <ul>
                        {recipes.map((r) => <li key={r.id}>{r.name}</li>)}
                    </ul>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
