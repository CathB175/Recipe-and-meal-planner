                                        <div style={{ fontSize: '0.85rem', color: 'var(--text-light)' }}>{extra.calories} cal | {extra.protein}g protein | {extra.carbs}g carbs | {extra.fat}g fat{extra.fiber > 0 ? ` | ${extra.fiber}g fiber` : ''}{extra.sugar > 0 ? ` | ${extra.sugar}g sugar` : ''}{extra.salt > 0 ? ` | ${extra.salt}mg salt` : ''}</div>
                                    </div>
                                    <button className="btn btn-secondary" onClick={() => deleteExtra(extra.id)} style={{ padding: '0.25rem 0.75rem', fontSize: '0.85rem' }}>Remove</button>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        function ShoppingList({ recipes, mealPlans }) {
            const [checkedItems, setCheckedItems] = useState({});
            const [customItems, setCustomItems] = useState([]);
            const [showAddCustom, setShowAddCustom] = useState(false);
            const [customItemName, setCustomItemName] = useState('');
            const [dateRange, setDateRange] = useState('2weeks');

            useEffect(() => { loadShoppingData(); }, []);

            const loadShoppingData = async () => {
                try {
                    const { data: checked } = await supabase.from('shopping_list_checked').select('*');
                    if (checked) { const checkedMap = {}; checked.forEach(item => { checkedMap[item.item_key] = true; }); setCheckedItems(checkedMap); }
                    const { data: custom } = await supabase.from('shopping_list_custom').select('*').order('created_at', { ascending: false });
                    if (custom) setCustomItems(custom);
                } catch (err) { console.log('Shopping list tables not found'); }
            };

            const generateShoppingList = () => {
                const ingredients = {};
                const now = new Date(); now.setHours(0, 0, 0, 0);
                let endDate = new Date(now);
                endDate.setDate(now.getDate() + (dateRange === 'week' ? 7 : 14));
                const relevantMealPlans = mealPlans.filter(mp => { const mealDate = new Date(mp.date); return mealDate >= now && mealDate < endDate; });
                relevantMealPlans.forEach(mp => {
                    if (mp.data_type === 'recipe' && mp.recipe_id) {
                        const recipe = recipes.find(r => r.id === mp.recipe_id);
                        if (recipe && recipe.ingredients && !recipe.is_simple) {
                            recipe.ingredients.forEach(ing => {
                                const key = ing.item.toLowerCase().trim();
                                if (ingredients[key]) { ingredients[key].amount += ` + ${ing.amount}`; }
                                else { ingredients[key] = { item: ing.item, amount: ing.amount }; }
                            });
                        }
                    }
                });
                return Object.values(ingredients);
            };

            const shoppingList = generateShoppingList();

            const toggleItem = async (itemKey) => {
                const newChecked = { ...checkedItems };
                if (newChecked[itemKey]) { delete newChecked[itemKey]; await supabase.from('shopping_list_checked').delete().eq('item_key', itemKey); }
                else { newChecked[itemKey] = true; await supabase.from('shopping_list_checked').insert({ item_key: itemKey, checked_at: new Date().toISOString() }); }
                setCheckedItems(newChecked);
            };

            const clearCheckedItems = async () => {
                const checkedCustomCount = customItems.filter(i => i.checked).length;
                const checkedRecipeCount = Object.keys(checkedItems).length;
                if (!confirm(`This will uncheck ${checkedRecipeCount} recipe items${checkedCustomCount > 0 ? ` and DELETE ${checkedCustomCount} checked custom items` : ''}. Continue?`)) return;
                await supabase.from('shopping_list_checked').delete().neq('item_key', '');
                setCheckedItems({});
                const checkedCustomIds = customItems.filter(i => i.checked).map(i => i.id);
                if (checkedCustomIds.length > 0) { await supabase.from('shopping_list_custom').delete().in('id', checkedCustomIds); setCustomItems(customItems.filter(i => !i.checked)); }
            };

            const handlePrint = () => {
                const printWindow = window.open('', '', 'width=800,height=600');
                const uncheckedCustom = customItems.filter(i => !i.checked);
                const uncheckedRecipe = shoppingList.filter(ing => !checkedItems[ing.item.toLowerCase().trim()]);
                const printContent = `<!DOCTYPE html><html><head><title>Shopping List</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { font-family: Arial, sans-serif; padding: 1cm; color: #000; } h1 { font-size: 1.8rem; margin-bottom: 0.5cm; color: #1a5f3d; border-bottom: 2px solid #1a5f3d; padding-bottom: 0.3cm; } h2 { font-size: 1.2rem; margin-top: 0.8cm; margin-bottom: 0.4cm; color: #1a5f3d; } ul { list-style: none; padding: 0; } li { padding: 0.3cm 0; border-bottom: 1px solid #ddd; display: flex; align-items: center; } li:before { content: "☐"; font-size: 1.2rem; margin-right: 0.5cm; color: #1a5f3d; } .date { color: #666; font-size: 0.9rem; margin-bottom: 0.5cm; } @page { size: A4 portrait; margin: 1cm; }</style></head><body><h1>Shopping List</h1><div class="date">Generated: ${new Date().toLocaleDateString('en-GB', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}</div>${uncheckedCustom.length > 0 ? `<h2>Custom Items (${uncheckedCustom.length})</h2><ul>${uncheckedCustom.map(item => `<li>${item.name}</li>`).join('')}</ul>` : ''}${uncheckedRecipe.length > 0 ? `<h2>From Recipes (${uncheckedRecipe.length})</h2><ul>${uncheckedRecipe.map(ing => `<li><strong>${ing.amount}</strong> ${ing.item}</li>`).join('')}</ul>` : ''}${uncheckedCustom.length === 0 && uncheckedRecipe.length === 0 ? '<p style="color:#666;margin-top:1cm;">All items checked!</p>' : ''}</body></html>`;
                printWindow.document.write(printContent);
                printWindow.document.close();
                printWindow.onload = function() { printWindow.print(); printWindow.onafterprint = function() { printWindow.close(); }; };
            };

            const addCustomItem = async () => {
                if (!customItemName.trim()) return;
                const { data } = await supabase.from('shopping_list_custom').insert({ name: customItemName.trim() }).select();
                if (data && data.length > 0) { setCustomItems([data[0], ...customItems]); setCustomItemName(''); setShowAddCustom(false); }
            };

            const deleteCustomItem = async (id) => { await supabase.from('shopping_list_custom').delete().eq('id', id); setCustomItems(customItems.filter(item => item.id !== id)); };

            const toggleCustomItem = async (id) => {
                const item = customItems.find(i => i.id === id);
                const newChecked = !item.checked;
                await supabase.from('shopping_list_custom').update({ checked: newChecked }).eq('id', id);
                setCustomItems(customItems.map(i => i.id === id ? { ...i, checked: newChecked } : i));
            };

            return (
                <div>
                    <div className="page-header"><h1 className="page-title">Shopping List</h1><p className="page-subtitle">Your ingredients for the selected period</p></div>
                    <div className="card" style={{ marginBottom: '1rem' }}>
                        <div style={{ display: 'flex', gap: '1rem', alignItems: 'center', flexWrap: 'wrap' }}>
                            <label style={{ fontWeight: '600' }}>Show ingredients for:</label>
                            <select className="input-field" value={dateRange} onChange={(e) => setDateRange(e.target.value)} style={{ width: 'auto', flex: '0 0 200px' }}>
                                <option value="week">Next Week</option>
                                <option value="2weeks">Next 2 Weeks</option>
                            </select>
                            <div style={{ marginLeft: 'auto', display: 'flex', gap: '0.5rem' }}>
                                <button className="btn btn-secondary" onClick={() => setShowAddCustom(true)}>➕ Add Item</button>
                                <button className="btn btn-secondary" onClick={handlePrint}>🖨️ Print List</button>
                                <button className="btn btn-secondary" onClick={clearCheckedItems} disabled={Object.keys(checkedItems).length === 0 && !customItems.some(i => i.checked)}>🗑️ Clear Checked</button>
                            </div>
                        </div>
                    </div>
                    {customItems.length > 0 && (
                        <div className="card" style={{ marginBottom: '1rem' }}>
                            <h3 style={{ marginBottom: '1rem', color: 'var(--primary)' }}>Custom Items</h3>
                            <ul className="shopping-list">
                                {customItems.map((item) => (
                                    <li key={item.id}>
                                        <input type="checkbox" className="checkbox" checked={item.checked || false} onChange={() => toggleCustomItem(item.id)} />
                                        <span style={{ textDecoration: item.checked ? 'line-through' : 'none', flex: 1 }}>{item.name}</span>
                                        <button className="btn btn-secondary" onClick={() => deleteCustomItem(item.id)} style={{ padding: '0.25rem 0.5rem', fontSize: '0.8rem' }}>✕</button>
                                    </li>
                                ))}
                            </ul>
                        </div>
                    )}
                    <div className="card">
                        <h3 style={{ marginBottom: '1rem', color: 'var(--primary)' }}>From Recipes & Snacks</h3>
                        {shoppingList.length === 0 ? <p style={{ color: 'var(--text-light)' }}>No ingredients found. Add recipes to your meal plan for the selected period.</p> : (
                            <ul className="shopping-list">
                                {shoppingList.map((ing, idx) => {
                                    const itemKey = ing.item.toLowerCase().trim();
                                    return (
                                        <li key={idx}>
                                            <input type="checkbox" className="checkbox" checked={checkedItems[itemKey] || false} onChange={() => toggleItem(itemKey)} />
                                            <span style={{ textDecoration: checkedItems[itemKey] ? 'line-through' : 'none' }}><strong>{ing.amount}</strong> {ing.item}</span>
                                        </li>
                                    );
                                })}
                            </ul>
                        )}
                    </div>
                    {showAddCustom && (
                        <div className="modal-overlay" onClick={() => setShowAddCustom(false)}>
                            <div className="modal" onClick={(e) => e.stopPropagation()} style={{ maxWidth: '500px' }}>
                                <div className="modal-header"><h2 className="modal-title">Add Custom Item</h2><button className="close-btn" onClick={() => setShowAddCustom(false)}>✕</button></div>
                                <div className="input-group"><label className="input-label">Item Name</label><input className="input-field" value={customItemName} onChange={(e) => setCustomItemName(e.target.value)} placeholder="e.g., Toilet paper, Detergent" onKeyPress={(e) => e.key === 'Enter' && addCustomItem()} autoFocus /></div>
                                <div className="action-buttons">
                                    <button className="btn btn-primary" onClick={addCustomItem} disabled={!customItemName.trim()}>Add Item</button>
                                    <button className="btn btn-secondary" onClick={() => setShowAddCustom(false)}>Cancel</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function NutritionGoals({ goals, reload }) {
            const [formData, setFormData] = useState(goals || { calories: 2000, protein: 150, carbs: 250, fat: 65, fiber: 30, sugar: 50, salt: 2300 });
            const handleSave = async () => {
                if (goals) { await supabase.from('nutrition_goals').update(formData).eq('id', goals.id); }
                else { await supabase.from('nutrition_goals').insert(formData); }
                reload();
            };
            return (
                <div>
                    <div className="page-header"><h1 className="page-title">Nutrition Goals</h1><p className="page-subtitle">Set your daily targets</p></div>
                    <div className="card" style={{ maxWidth: '600px' }}>
                        <div className="form-row">
                            <div className="input-group"><label className="input-label" style={{ color: 'var(--text)', fontWeight: '700' }}>Calories</label><input type="number" className="input-field" value={formData.calories} onChange={(e) => setFormData({ ...formData, calories: parseFloat(e.target.value) || 0 })} /></div>
                            <div className="input-group"><label className="input-label" style={{ color: 'var(--text)', fontWeight: '700' }}>Protein (g)</label><input type="number" className="input-field" value={formData.protein} onChange={(e) => setFormData({ ...formData, protein: parseFloat(e.target.value) || 0 })} /></div>
                        </div>
                        <div className="form-row">
                            <div className="input-group"><label className="input-label" style={{ color: 'var(--text)', fontWeight: '700' }}>Carbs (g)</label><input type="number" className="input-field" value={formData.carbs} onChange={(e) => setFormData({ ...formData, carbs: parseFloat(e.target.value) || 0 })} /></div>
                            <div className="input-group"><label className="input-label" style={{ color: 'var(--text)', fontWeight: '700' }}>Fat (g)</label><input type="number" className="input-field" value={formData.fat} onChange={(e) => setFormData({ ...formData, fat: parseFloat(e.target.value) || 0 })} /></div>
                        </div>
                        <div className="form-row">
                            <div className="input-group"><label className="input-label" style={{ color: 'var(--text)', fontWeight: '700' }}>Fiber (g)</label><input type="number" className="input-field" value={formData.fiber} onChange={(e) => setFormData({ ...formData, fiber: parseFloat(e.target.value) || 0 })} /></div>
                            <div className="input-group"><label className="input-label" style={{ color: 'var(--text)', fontWeight: '700' }}>Sugar (g)</label><input type="number" className="input-field" value={formData.sugar} onChange={(e) => setFormData({ ...formData, sugar: parseFloat(e.target.value) || 0 })} /></div>
                        </div>
                        <div className="input-group"><label className="input-label" style={{ color: 'var(--text)', fontWeight: '700' }}>Salt (mg)</label><input type="number" className="input-field" value={formData.salt} onChange={(e) => setFormData({ ...formData, salt: parseFloat(e.target.value) || 0 })} /></div>
                        <button className="btn btn-primary" onClick={handleSave} style={{ marginTop: '1rem' }}>Save Goals</button>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
