<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RecipeFlow - Your Personal Nutrition Hub</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍳</text></svg>">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a5f3d;
            --primary-light: #2d8659;
            --primary-dark: #0f3d28;
            --accent: #e67e22;
            --accent-light: #f39c12;
            --bg: #faf8f5;
            --surface: #ffffff;
            --text: #2c3e50;
            --text-light: #7f8c8d;
            --border: #e8e4df;
            --shadow: rgba(26, 95, 61, 0.08);
            --error: #e74c3c;
            --success: #27ae60;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
        h1, h2, h3, h4, h5 { font-family: 'Crimson Pro', serif; font-weight: 700; }
        .app-container { display: flex; min-height: 100vh; }
        .sidebar { width: 260px; background: var(--primary-dark); color: white; padding: 2rem 0; position: fixed; height: 100vh; overflow-y: auto; z-index: 100; }
        .sidebar-header { padding: 0 1.5rem 2rem; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .logo { font-size: 1.75rem; font-weight: 700; color: white; display: flex; align-items: center; gap: 0.5rem; }
        .logo::before { content: "🍳"; font-size: 2rem; }
        .nav-menu { list-style: none; padding: 1.5rem 0; }
        .nav-item { padding: 0.75rem 1.5rem; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 0.75rem; color: rgba(255,255,255,0.8); }
        .nav-item:hover { background: rgba(255,255,255,0.1); color: white; }
        .nav-item.active { background: var(--primary-light); color: white; border-left: 3px solid var(--accent); }
        .main-content { flex: 1; margin-left: 260px; padding: 2rem; max-width: 1400px; }
        .page-header { margin-bottom: 2rem; }
        .page-title { font-size: 2.5rem; color: var(--primary-dark); margin-bottom: 0.5rem; }
        .page-subtitle { color: var(--text-light); font-size: 1.1rem; }
        .btn { padding: 0.75rem 1.5rem; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: all 0.2s; font-size: 0.95rem; font-family: 'DM Sans', sans-serif; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-light); transform: translateY(-1px); box-shadow: 0 4px 12px var(--shadow); }
        .btn-secondary { background: white; color: var(--primary); border: 2px solid var(--primary); }
        .btn-secondary:hover { background: var(--primary); color: white; }
        .btn-accent { background: var(--accent); color: white; }
        .btn-accent:hover { background: var(--accent-light); }
        .card { background: var(--surface); border-radius: 12px; padding: 1.5rem; box-shadow: 0 2px 8px var(--shadow); margin-bottom: 1.5rem; }
        .recipe-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; margin-top: 1.5rem; }
        .recipe-card { background: var(--surface); border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px var(--shadow); transition: all 0.3s; cursor: pointer; }
        .recipe-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px var(--shadow); }
        .recipe-image { width: 100%; height: 180px; object-fit: cover; background: linear-gradient(135deg, var(--primary-light) 0%, var(--primary) 100%); }
        .recipe-content { padding: 1.25rem; }
        .recipe-name { font-size: 1.25rem; font-weight: 700; color: var(--primary-dark); margin-bottom: 0.75rem; }
        .recipe-meta { display: flex; gap: 1rem; font-size: 0.85rem; color: var(--text-light); margin-bottom: 0.5rem; }
        .recipe-meta span { display: flex; align-items: center; gap: 0.25rem; }
        .input-group { margin-bottom: 1.5rem; }
        .input-label { display: block; margin-bottom: 0.5rem; font-weight: 600; color: var(--text); }
        .input-field { width: 100%; padding: 0.75rem; border: 2px solid var(--border); border-radius: 8px; font-size: 1rem; font-family: 'DM Sans', sans-serif; transition: border-color 0.2s; }
        .input-field:focus { outline: none; border-color: var(--primary); }
        textarea.input-field { min-height: 100px; resize: vertical; }
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 2000; animation: fadeIn 0.2s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .modal { background: var(--surface); border-radius: 16px; padding: 2rem; max-width: 800px; max-height: 90vh; overflow-y: auto; width: 90%; animation: slideUp 0.3s; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        .modal-title { font-size: 2rem; color: var(--primary-dark); }
        .close-btn { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--text-light); padding: 0.25rem; }
        .meal-plan-grid { display: grid; gap: 1rem; }
        .day-card { background: var(--surface); border-radius: 12px; padding: 1.5rem; box-shadow: 0 2px 8px var(--shadow); }
        .day-header { font-size: 1.5rem; color: var(--primary-dark); margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 2px solid var(--border); }
        .meal-slot { margin-bottom: 1rem; padding: 1rem; background: var(--bg); border-radius: 8px; }
        .meal-type { font-weight: 600; color: var(--primary); margin-bottom: 0.5rem; }
        .snack-item { display: flex; justify-content: space-between; align-items: center; padding: 0.4rem 0; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
        .snack-item:last-child { border-bottom: none; }
        .badge { display: inline-block; padding: 0.25rem 0.75rem; border-radius: 20px; font-size: 0.85rem; font-weight: 600; margin-right: 0.5rem; }
        .badge-primary { background: var(--primary-light); color: white; }
        .badge-accent { background: var(--accent); color: white; }
        .nutrition-summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem; margin-top: 1rem; }
        .nutrition-item { background: var(--bg); padding: 1rem; border-radius: 8px; text-align: center; }
        .nutrition-value { font-size: 1.75rem; font-weight: 700; color: var(--primary); }
        .nutrition-label { font-size: 0.9rem; color: var(--text-light); margin-top: 0.25rem; }
        .action-buttons { display: flex; gap: 1rem; margin-top: 1.5rem; flex-wrap: wrap; }
        .search-bar { position: relative; margin-bottom: 1.5rem; }
        .search-input { width: 100%; padding: 1rem 1rem 1rem 3rem; border: 2px solid var(--border); border-radius: 12px; font-size: 1rem; }
        .search-icon { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-light); }
        .quick-food-item { display: flex; justify-content: space-between; align-items: center; padding: 1rem; background: var(--bg); border-radius: 8px; margin-bottom: 0.75rem; }
        .shopping-list { list-style: none; }
        .shopping-list li { padding: 0.75rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 0.75rem; }
        .shopping-list li:last-child { border-bottom: none; }
        .checkbox { width: 20px; height: 20px; cursor: pointer; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .simple-recipe-toggle { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1.5rem; padding: 1rem; background: var(--bg); border-radius: 8px; }
        .toggle-switch { position: relative; width: 50px; height: 26px; background: var(--border); border-radius: 13px; cursor: pointer; transition: background 0.3s; }
        .toggle-switch.active { background: var(--primary); }
        .toggle-slider { position: absolute; top: 3px; left: 3px; width: 20px; height: 20px; background: white; border-radius: 50%; transition: transform 0.3s; }
        .toggle-switch.active .toggle-slider { transform: translateX(24px); }
        .mobile-menu-toggle { display: none; position: fixed; top: 1rem; left: 1rem; z-index: 200; background: var(--primary); color: white; border: none; padding: 0.75rem; border-radius: 8px; font-size: 1.5rem; cursor: pointer; box-shadow: 0 2px 8px var(--shadow); }
        .sidebar-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 99; }
        @media (max-width: 768px) {
            .mobile-menu-toggle { display: block; }
            .sidebar { transform: translateX(-100%); transition: transform 0.3s; z-index: 150; width: 80%; max-width: 300px; }
            .sidebar.mobile-open { transform: translateX(0); }
            .sidebar-overlay.open { display: block; }
            .main-content { margin-left: 0; padding: 5rem 1rem 1rem 1rem; }
            .recipe-grid { grid-template-columns: 1fr; }
            .form-row { grid-template-columns: 1fr; }
            .modal { width: 95%; max-height: 85vh; }
        }
        @media print {
            .sidebar, .main-content, .action-buttons, .close-btn, .page-header, .search-bar, .recipe-grid, .nav-menu { display: none !important; }
            body, html { margin: 0 !important; padding: 0 !important; overflow: visible !important; background: white !important; }
            .modal-overlay { position: static !important; background: transparent !important; display: block !important; }
            .modal { position: static !important; max-height: none !important; overflow: visible !important; box-shadow: none !important; max-width: 19cm !important; width: 100% !important; padding: 1cm !important; margin: 0 auto !important; background: white !important; border-radius: 0 !important; }
            @page { size: A4 portrait; margin: 1cm; }
            .modal img { max-width: 8cm !important; max-height: 6cm !important; object-fit: contain !important; display: block; margin: 0 auto 0.5cm !important; }
            .modal-title { font-size: 1.5rem !important; margin-bottom: 0.3cm !important; color: #000 !important; }
            .modal-header { margin-bottom: 0.5cm !important; page-break-after: avoid; border: none !important; }
            .recipe-meta { font-size: 0.9rem !important; margin-bottom: 0.5cm !important; page-break-after: avoid; color: #333 !important; }
            .card { padding: 0.5cm !important; margin-bottom: 0.5cm !important; page-break-inside: avoid; background: #f5f5f5 !important; border-radius: 4px !important; }
            .nutrition-summary { gap: 0.3cm !important; }
            .nutrition-item { padding: 0.3cm !important; background: white !important; }
            .nutrition-value { font-size: 1.2rem !important; color: #000 !important; }
            .nutrition-label { font-size: 0.8rem !important; color: #666 !important; }
            h3 { font-size: 1.2rem !important; margin-top: 0.5cm !important; margin-bottom: 0.3cm !important; page-break-after: avoid; color: #000 !important; }
            ul, ol { padding-left: 0.8cm !important; }
            li { padding: 0.15cm 0 !important; border-bottom: 0.5px solid #ddd !important; font-size: 0.9rem !important; page-break-inside: avoid; color: #000 !important; }
            ol li { margin-bottom: 0.3cm !important; line-height: 1.4 !important; }
            p { font-size: 0.9rem !important; line-height: 1.4 !important; color: #000 !important; }
            .ingredients-section { page-break-after: auto; }
            .steps-section { page-break-before: auto; }
            input[type="number"] { border: 1px solid #ccc !important; padding: 2px 4px !important; font-weight: bold !important; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        const SUPABASE_URL = 'https://hebuaabantmnfdxxkaif.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_xzVfo0l-eLpkP4TuUy17KQ_kLLUUScF';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const formatDate = (date) => {
            const d = new Date(date);
            const year = d.getFullYear();
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        };

        const getNextTwoWeeks = () => {
            const dates = [];
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const dayOfWeek = today.getDay();
            const daysFromMonday = dayOfWeek === 0 ? 6 : dayOfWeek - 1;
            const thisMonday = new Date(today);
            thisMonday.setDate(today.getDate() - daysFromMonday);
            for (let i = 0; i < 14; i++) {
                const date = new Date(thisMonday);
                date.setDate(thisMonday.getDate() + i);
                dates.push(date);
            }
            return dates;
        };

        const getDayName = (date) => {
            return date.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
        };

        function App() {
            const [currentPage, setCurrentPage] = useState('dashboard');
            const [recipes, setRecipes] = useState([]);
            const [mealPlans, setMealPlans] = useState([]);
            const [dailyExtras, setDailyExtras] = useState([]);
            const [nutritionGoals, setNutritionGoals] = useState(null);
            const [mobileMenuOpen, setMobileMenuOpen] = useState(false);

            const loadRecipes = async () => {
                const { data } = await supabase.from('recipes').select('*');
                if (data) setRecipes(data);
            };

            const loadMealPlans = async () => {
                const { data } = await supabase.from('meal_plans').select('*');
                if (data) setMealPlans(data);
            };

            const loadDailyExtras = async () => {
                const { data } = await supabase.from('daily_extras').select('*');
                if (data) setDailyExtras(data);
            };

            const loadNutritionGoals = async () => {
                try {
                    const { data } = await supabase.from('nutrition_goals').select('*').limit(1);
                    if (data && data.length > 0) {
                        setNutritionGoals(data[0]);
                    } else {
                        const { data: newGoal } = await supabase.from('nutrition_goals').insert({
                            calories: 2000, protein: 150, carbs: 250, fat: 65, fiber: 30, sugar: 50
                        }).select();
                        if (newGoal && newGoal.length > 0) setNutritionGoals(newGoal[0]);
                    }
                } catch (err) { console.error('Exception loading nutrition goals:', err); }
            };

            useEffect(() => {
                loadRecipes();
                loadMealPlans();
                loadDailyExtras();
                loadNutritionGoals();
            }, []);

            const renderPage = () => {
                switch (currentPage) {
                    case 'dashboard': return <Dashboard recipes={recipes} mealPlans={mealPlans} dailyExtras={dailyExtras} nutritionGoals={nutritionGoals} reloadMealPlans={loadMealPlans} />;
                    case 'recipes': return <Recipes recipes={recipes} setRecipes={setRecipes} reload={loadRecipes} reloadMealPlans={loadMealPlans} />;
                    case 'meal-planning': return <MealPlanning recipes={recipes} mealPlans={mealPlans} reload={loadMealPlans} />;
                    case 'shopping-list': return <ShoppingList recipes={recipes} mealPlans={mealPlans} />;
                    case 'nutrition-goals': return <NutritionGoals goals={nutritionGoals} reload={loadNutritionGoals} />;
                    default: return <Dashboard recipes={recipes} mealPlans={mealPlans} dailyExtras={dailyExtras} nutritionGoals={nutritionGoals} reloadMealPlans={loadMealPlans} />;
                }
            };

            return (
                <div className="app-container">
                    <button className="mobile-menu-toggle" onClick={() => setMobileMenuOpen(!mobileMenuOpen)}>☰</button>
                    <div className={`sidebar-overlay ${mobileMenuOpen ? 'open' : ''}`} onClick={() => setMobileMenuOpen(false)}></div>
                    <Sidebar currentPage={currentPage} setCurrentPage={(page) => { setCurrentPage(page); setMobileMenuOpen(false); }} mobileOpen={mobileMenuOpen} />
                    <div className="main-content">{renderPage()}</div>
                </div>
            );
        }

        function Sidebar({ currentPage, setCurrentPage, mobileOpen }) {
            const menuItems = [
                { id: 'dashboard', label: 'Dashboard', icon: '📊' },
                { id: 'recipes', label: 'Recipes', icon: '📖' },
                { id: 'meal-planning', label: 'Meal Planning', icon: '📅' },
                { id: 'shopping-list', label: 'Shopping List', icon: '🛒' },
                { id: 'nutrition-goals', label: 'Nutrition Goals', icon: '🎯' },
            ];
            return (
                <nav className={`sidebar ${mobileOpen ? 'mobile-open' : ''}`}>
                    <div className="sidebar-header"><div className="logo">RecipeFlow</div></div>
                    <ul className="nav-menu">
                        {menuItems.map(item => (
                            <li key={item.id} className={`nav-item ${currentPage === item.id ? 'active' : ''}`} onClick={() => setCurrentPage(item.id)}>
                                <span>{item.icon}</span><span>{item.label}</span>
                            </li>
                        ))}
                    </ul>
                </nav>
            );
        }

        function Dashboard({ recipes, mealPlans, dailyExtras, nutritionGoals, reloadMealPlans }) {
            const today = formatDate(new Date());
            const todaysMeals = mealPlans.filter(mp => mp.date === today);
            const todaysExtras = dailyExtras.filter(de => de.date === today);
            const todaysSnacks = todaysMeals.filter(m => m.meal_type === 'snack');

            const getMealNutrition = (meal) => {
                if (meal.data_type === 'recipe' && meal.recipe_id) {
                    const recipe = recipes.find(r => r.id === meal.recipe_id);
                    if (recipe && recipe.nutrition) {
                        return { name: recipe.name, calories: recipe.nutrition.calories || 0, protein: recipe.nutrition.protein || 0, carbs: recipe.nutrition.carbs || 0, fat: recipe.nutrition.fat || 0, fiber: recipe.nutrition.fiber || 0, sugar: recipe.nutrition.sugar || 0, salt: recipe.nutrition.salt || 0 };
                    }
                }
                return { name: meal.custom_text || 'Unknown', calories: 0, protein: 0, carbs: 0, fat: 0, fiber: 0, sugar: 0, salt: 0 };
            };

            const calculateTodaysNutrition = () => {
                let totals = { calories: 0, protein: 0, carbs: 0, fat: 0, fiber: 0, sugar: 0, salt: 0 };
                todaysMeals.forEach(meal => {
                    const n = getMealNutrition(meal);
                    totals.calories += n.calories; totals.protein += n.protein; totals.carbs += n.carbs;
                    totals.fat += n.fat; totals.fiber += n.fiber; totals.sugar += n.sugar; totals.salt += n.salt;
                });
                todaysExtras.forEach(extra => {
                    totals.calories += extra.calories || 0; totals.protein += extra.protein || 0;
                    totals.carbs += extra.carbs || 0; totals.fat += extra.fat || 0;
                    totals.fiber += extra.fiber || 0; totals.sugar += extra.sugar || 0; totals.salt += extra.salt || 0;
                });
                return totals;
            };

            const nutrition = calculateTodaysNutrition();

            const getProgressColor = (current, goal) => {
                if (!goal) return 'var(--primary)';
                const pct = (current / goal) * 100;
                if (pct < 80) return '#f39c12';
                if (pct <= 110) return '#27ae60';
                return '#e74c3c';
            };

            const ProgressBar = ({ label, current, goal, unit = 'g' }) => {
                const percentage = goal ? Math.min((current / goal) * 100, 100) : 0;
                const color = getProgressColor(current, goal);
                return (
                    <div style={{ marginBottom: '1rem' }}>
                        <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '0.25rem' }}>
                            <span style={{ fontWeight: '600', fontSize: '0.9rem' }}>{label}</span>
                            <span style={{ fontSize: '0.9rem', color: 'var(--text-light)' }}>{Math.round(current)}{unit} {goal && `/ ${goal}${unit}`}</span>
                        </div>
                        {goal && (
                            <div style={{ width: '100%', height: '8px', background: 'var(--border)', borderRadius: '4px', overflow: 'hidden' }}>
                                <div style={{ width: `${percentage}%`, height: '100%', background: color, transition: 'width 0.3s' }}></div>
                            </div>
                        )}
                    </div>
                );
            };

            const removeMeal = async (mealId, mealType) => {
                if (confirm(`Remove this ${mealType}?`)) {
                    await supabase.from('meal_plans').delete().eq('id', mealId);
                    reloadMealPlans();
                }
            };

            const MealCard = ({ mealType, meal, mealId }) => {
                const mealNutrition = meal ? getMealNutrition(meal) : null;
                return (
                    <div style={{ background: 'var(--bg)', padding: '1rem', borderRadius: '8px', marginBottom: '0.75rem', border: meal ? '2px solid var(--primary-light)' : '2px dashed var(--border)' }}>
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '0.5rem' }}>
                            <div>
                                <div style={{ fontWeight: '600', color: 'var(--primary)', marginBottom: '0.25rem' }}>{mealType.charAt(0).toUpperCase() + mealType.slice(1)}</div>
                                {mealNutrition ? <div style={{ fontWeight: '600', fontSize: '1rem' }}>{mealNutrition.name}</div> : <div style={{ color: 'var(--text-light)', fontSize: '0.9rem' }}>No meal planned</div>}
                            </div>
                            {meal && <button className="btn btn-secondary" onClick={() => removeMeal(mealId, mealType)} style={{ padding: '0.25rem 0.5rem', fontSize: '0.8rem' }}>✕</button>}
                        </div>
                        {mealNutrition && (
                            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(80px, 1fr))', gap: '0.5rem', fontSize: '0.85rem', color: 'var(--text-light)' }}>
                                <div><strong>{Math.round(mealNutrition.calories)}</strong> cal</div>
                                <div><strong>{Math.round(mealNutrition.protein)}g</strong> protein</div>
                                <div><strong>{Math.round(mealNutrition.carbs)}g</strong> carbs</div>
                                <div><strong>{Math.round(mealNutrition.fat)}g</strong> fat</div>
                            </div>
                        )}
                    </div>
                );
            };

            return (
                <div>
                    <div className="page-header">
                        <h1 className="page-title">Dashboard</h1>
                        <p className="page-subtitle">{new Date().toLocaleDateString('en-GB', { weekday: 'long', month: 'long', day: 'numeric' })}</p>
                    </div>
                    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '1.5rem' }}>
                        <div>
                            <div className="card">
                                <h2 style={{ marginBottom: '1rem' }}>📅 Today's Meals</h2>
                                <MealCard mealType="breakfast" meal={todaysMeals.find(m => m.meal_type === 'breakfast')} mealId={todaysMeals.find(m => m.meal_type === 'breakfast')?.id} />
                                <MealCard mealType="lunch" meal={todaysMeals.find(m => m.meal_type === 'lunch')} mealId={todaysMeals.find(m => m.meal_type === 'lunch')?.id} />
                                <MealCard mealType="dinner" meal={todaysMeals.find(m => m.meal_type === 'dinner')} mealId={todaysMeals.find(m => m.meal_type === 'dinner')?.id} />

                                {/* Snacks */}
                                {todaysSnacks.length > 0 && (
                                    <div style={{ background: 'var(--bg)', padding: '1rem', borderRadius: '8px', marginBottom: '0.75rem', border: '2px solid var(--primary-light)' }}>
                                        <div style={{ fontWeight: '600', color: 'var(--primary)', marginBottom: '0.5rem' }}>Snacks</div>
                                        {todaysSnacks.map(snack => {
                                            const n = getMealNutrition(snack);
                                            return (
                                                <div key={snack.id} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '0.3rem 0', borderBottom: '1px solid var(--border)', fontSize: '0.9rem' }}>
                                                    <span style={{ fontWeight: '600' }}>{n.name}</span>
                                                    <div style={{ display: 'flex', alignItems: 'center', gap: '0.75rem' }}>
                                                        <span style={{ color: 'var(--text-light)', fontSize: '0.8rem' }}>{Math.round(n.calories)} cal</span>
                                                        <button onClick={() => removeMeal(snack.id, 'snack')} style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--text-light)', fontSize: '0.85rem' }}>✕</button>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                )}

                                {todaysExtras.length > 0 && (
                                    <div style={{ background: 'var(--bg)', padding: '1rem', borderRadius: '8px', border: '2px solid var(--accent)' }}>
                                        <div style={{ fontWeight: '600', color: 'var(--accent)', marginBottom: '0.5rem' }}>Daily Extras</div>
                                        {todaysExtras.map((extra, idx) => (
                                            <div key={idx} style={{ fontSize: '0.9rem', marginBottom: '0.25rem', display: 'flex', justifyContent: 'space-between' }}>
                                                <span>{extra.name}</span>
                                                <span style={{ color: 'var(--text-light)' }}>{extra.calories} cal, {extra.protein}g protein</span>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        </div>
                        <div>
                            <div className="card">
                                <h2 style={{ marginBottom: '1rem' }}>📊 Nutrition Progress</h2>
                                <ProgressBar label="Calories" current={nutrition.calories} goal={nutritionGoals?.calories} unit="" />
                                <ProgressBar label="Protein" current={nutrition.protein} goal={nutritionGoals?.protein} />
                                <ProgressBar label="Carbs" current={nutrition.carbs} goal={nutritionGoals?.carbs} />
                                <ProgressBar label="Fat" current={nutrition.fat} goal={nutritionGoals?.fat} />
                                <ProgressBar label="Fiber" current={nutrition.fiber} goal={nutritionGoals?.fiber} />
                                <ProgressBar label="Sugar" current={nutrition.sugar} goal={nutritionGoals?.sugar} />
                                <ProgressBar label="Salt" current={nutrition.salt} goal={nutritionGoals?.salt} unit="mg" />
                                <div style={{ marginTop: '1.5rem', padding: '1rem', background: 'var(--bg)', borderRadius: '8px', borderLeft: '4px solid var(--primary)' }}>
                                    <div style={{ fontWeight: '600', marginBottom: '0.5rem' }}>Daily Summary</div>
                                    <div style={{ fontSize: '0.9rem', color: 'var(--text-light)' }}>
                                        {todaysMeals.length === 0 ? <p>No meals planned for today. Visit Meal Planning to add meals.</p> : (
                                            <>
                                                <div>✓ {todaysMeals.filter(m => m.meal_type !== 'snack').length} meals planned</div>
                                                {todaysSnacks.length > 0 && <div>✓ {todaysSnacks.length} snack{todaysSnacks.length > 1 ? 's' : ''} added</div>}
                                                {todaysExtras.length > 0 && <div>✓ {todaysExtras.length} extras added</div>}
                                                {nutritionGoals && (
                                                    <>
                                                        <div style={{ marginTop: '0.5rem' }}>{nutrition.calories >= nutritionGoals.calories * 0.9 && nutrition.calories <= nutritionGoals.calories * 1.1 ? '✓ Calorie target on track' : nutrition.calories < nutritionGoals.calories * 0.9 ? '⚠️ Below calorie target' : '⚠️ Above calorie target'}</div>
                                                        <div>{nutrition.protein >= nutritionGoals.protein * 0.9 ? '✓ Protein target on track' : '⚠️ Low protein'}</div>
                                                    </>
                                                )}
                                            </>
                                        )}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function Recipes({ recipes, setRecipes, reload, reloadMealPlans }) {
            const [showModal, setShowModal] = useState(false);
            const [editingRecipe, setEditingRecipe] = useState(null);
            const [searchTerm, setSearchTerm] = useState('');
            const [viewingRecipe, setViewingRecipe] = useState(null);
            const [selectedCollection, setSelectedCollection] = useState('all');
            const [selectedKeyword, setSelectedKeyword] = useState('');

            const allCollections = [...new Set(recipes.flatMap(r => r.collections || []))].sort();

            const filteredRecipes = recipes.filter(r => {
                const matchesSearch = !searchTerm || r.name.toLowerCase().includes(searchTerm.toLowerCase()) || (r.keywords && r.keywords.some(k => k.toLowerCase().includes(searchTerm.toLowerCase())));
                const matchesCollection = selectedCollection === 'all' || (r.collections && r.collections.includes(selectedCollection));
                const matchesKeyword = !selectedKeyword || (r.keywords && r.keywords.includes(selectedKeyword));
                return matchesSearch && matchesCollection && matchesKeyword;
            });

            const getCollectionCount = (collection) => recipes.filter(r => r.collections && r.collections.includes(collection)).length;

            const handleExport = () => {
                const dataStr = JSON.stringify(recipes, null, 2);
                const dataBlob = new Blob([dataStr], { type: 'application/json' });
                const url = URL.createObjectURL(dataBlob);
                const link = document.createElement('a');
                link.href = url; link.download = 'recipes-export.json'; link.click();
            };

            const handleImport = () => {
                const input = document.createElement('input');
                input.type = 'file'; input.accept = 'application/json';
                input.onchange = async (e) => {
                    const file = e.target.files[0];
                    const text = await file.text();
                    try {
                        const imported = JSON.parse(text);
                        for (const recipe of imported) { const { id, ...recipeData } = recipe; await supabase.from('recipes').insert(recipeData); }
                        alert('Recipes imported successfully!'); reload();
                    } catch (error) { alert('Error importing recipes. Please check the file format.'); }
                };
                input.click();
            };

            const handlePasteImport = () => {
                const text = prompt('Paste your JSON text here:');
                if (!text) return;
                try {
                    const imported = JSON.parse(text);
                    (async () => {
                        for (const recipe of imported) { const { id, ...recipeData } = recipe; await supabase.from('recipes').insert(recipeData); }
                        alert('Recipes imported successfully!'); reload();
                    })();
                } catch (error) { alert('Error importing recipes. Please check the JSON format.'); }
            };

            return (
                <div>
                    <div className="page-header"><h1 className="page-title">Recipes</h1><p className="page-subtitle">Manage your recipe collection</p></div>
                    <div className="search-bar">
                        <span className="search-icon">🔍</span>
                        <input type="text" className="search-input" placeholder="Search recipes by name or keywords..." value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />
                    </div>
                    {allCollections.length > 0 && (
                        <div className="card" style={{ marginBottom: '1.5rem' }}>
                            <div style={{ display: 'flex', flexWrap: 'wrap', gap: '0.5rem', alignItems: 'center' }}>
                                <span style={{ fontWeight: '600', marginRight: '0.5rem' }}>Collections:</span>
                                <button className={`btn ${selectedCollection === 'all' ? 'btn-primary' : 'btn-secondary'}`} onClick={() => { setSelectedCollection('all'); setSelectedKeyword(''); }} style={{ padding: '0.5rem 1rem', fontSize: '0.9rem' }}>All ({recipes.length})</button>
                                {allCollections.map(collection => (
                                    <button key={collection} className={`btn ${selectedCollection === collection ? 'btn-primary' : 'btn-secondary'}`} onClick={() => { setSelectedCollection(collection); setSelectedKeyword(''); }} style={{ padding: '0.5rem 1rem', fontSize: '0.9rem' }}>{collection} ({getCollectionCount(collection)})</button>
                                ))}
                            </div>
                        </div>
                    )}
                    {(selectedCollection !== 'all' || selectedKeyword || searchTerm) && (
                        <div style={{ marginBottom: '1rem', display: 'flex', gap: '0.5rem', flexWrap: 'wrap', alignItems: 'center' }}>
                            <span style={{ color: 'var(--text-light)', fontSize: '0.9rem' }}>Active filters:</span>
                            {selectedCollection !== 'all' && <span className="badge badge-primary" style={{ cursor: 'pointer' }} onClick={() => setSelectedCollection('all')}>Collection: {selectedCollection} ✕</span>}
                            {selectedKeyword && <span className="badge badge-accent" style={{ cursor: 'pointer' }} onClick={() => setSelectedKeyword('')}>Keyword: {selectedKeyword} ✕</span>}
                            {searchTerm && <span className="badge badge-accent" style={{ cursor: 'pointer' }} onClick={() => setSearchTerm('')}>Search: {searchTerm} ✕</span>}
                            <button className="btn btn-secondary" onClick={() => { setSelectedCollection('all'); setSelectedKeyword(''); setSearchTerm(''); }} style={{ padding: '0.25rem 0.75rem', fontSize: '0.85rem' }}>Clear All</button>
                        </div>
                    )}
                    <div style={{ color: 'var(--text-light)', marginBottom: '1rem', fontSize: '0.95rem' }}>Showing {filteredRecipes.length} of {recipes.length} recipes</div>
                    <div className="action-buttons">
                        <button className="btn btn-primary" onClick={() => { setEditingRecipe(null); setShowModal(true); }}>➕ Add Recipe</button>
                        <button className="btn btn-secondary" onClick={handleImport}>📥 Import File</button>
                        <button className="btn btn-secondary" onClick={handlePasteImport}>📋 Paste JSON</button>
                        <button className="btn btn-secondary" onClick={handleExport}>📤 Export</button>
                    </div>
                    <div className="recipe-grid">
                        {filteredRecipes.map(recipe => (
                            <div key={recipe.id} className="recipe-card" onClick={() => setViewingRecipe(recipe)}>
                                {recipe.image_url ? <img src={recipe.image_url} alt={recipe.name} className="recipe-image" /> : <div className="recipe-image" style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '3rem' }}>🍽️</div>}
                                <div className="recipe-content">
                                    <h3 className="recipe-name">{recipe.name}</h3>
                                    <div className="recipe-meta">
                                        {(recipe.prep_time || recipe.cook_time) && <span>⏱️ {(parseInt(recipe.prep_time) || 0) + (parseInt(recipe.cook_time) || 0)} min</span>}
                                        {recipe.nutrition?.calories && <span>🔥 {recipe.nutrition.calories} cal</span>}
                                    </div>
                                    {recipe.collections && recipe.collections.length > 0 && <div style={{ marginTop: '0.5rem' }}>{recipe.collections.map((col, idx) => <span key={idx} className="badge badge-primary">{col}</span>)}</div>}
                                    {recipe.keywords && recipe.keywords.length > 0 && (
                                        <div style={{ marginTop: '0.5rem' }}>
                                            {recipe.keywords.map((keyword, idx) => (
                                                <span key={idx} className="badge badge-accent" onClick={(e) => { e.stopPropagation(); setSelectedKeyword(keyword); setSelectedCollection('all'); }} style={{ cursor: 'pointer' }} title={`Filter by ${keyword}`}>🔍 {keyword}</span>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>
                        ))}
                    </div>
                    {showModal && <RecipeModal recipe={editingRecipe} onClose={() => setShowModal(false)} onSave={reload} />}
                    {viewingRecipe && <RecipeDetailModal recipe={viewingRecipe} onClose={() => setViewingRecipe(null)} onEdit={() => { setEditingRecipe(viewingRecipe); setViewingRecipe(null); setShowModal(true); }} onDelete={async () => { await supabase.from('recipes').delete().eq('id', viewingRecipe.id); setViewingRecipe(null); reload(); }} reloadMealPlans={reloadMealPlans} />}
                </div>
            );
        }

        function RecipeModal({ recipe, onClose, onSave }) {
            const [formData, setFormData] = useState(recipe || { name: '', servings: 1, prep_time: null, cook_time: null, source: '', image_url: '', collections: [], keywords: [], ingredients: [], steps: [], notes: '', nutrition: { calories: 0, protein: 0, carbs: 0, fat: 0, fiber: 0, sugar: 0, salt: 0 }, is_simple: false });

            const handleSave = async () => {
                try {
                    const sanitizedData = { ...formData, servings: parseInt(formData.servings) || 1, prep_time: formData.prep_time ? parseInt(formData.prep_time) : null, cook_time: formData.cook_time ? parseInt(formData.cook_time) : null, collections: Array.isArray(formData.collections) ? formData.collections : [], keywords: Array.isArray(formData.keywords) ? formData.keywords : [], ingredients: Array.isArray(formData.ingredients) ? formData.ingredients : [], steps: Array.isArray(formData.steps) ? formData.steps : [], nutrition: { calories: parseFloat(formData.nutrition?.calories) || 0, protein: parseFloat(formData.nutrition?.protein) || 0, carbs: parseFloat(formData.nutrition?.carbs) || 0, fat: parseFloat(formData.nutrition?.fat) || 0, fiber: parseFloat(formData.nutrition?.fiber) || 0, sugar: parseFloat(formData.nutrition?.sugar) || 0, salt: parseFloat(formData.nutrition?.salt) || 0 }, is_simple: Boolean(formData.is_simple) };
                    if (recipe) {
                        const { error } = await supabase.from('recipes').update(sanitizedData).eq('id', recipe.id).select();
                        if (error) { alert(`Error updating recipe: ${error.message}`); return; }
                    } else {
                        const { error } = await supabase.from('recipes').insert(sanitizedData).select();
                        if (error) { alert(`Error saving recipe: ${error.message}`); return; }
                    }
                    onSave(); onClose();
                } catch (err) { alert(`Exception: ${err.message}`); }
            };

            return (
                <div className="modal-overlay" onClick={onClose}>
                    <div className="modal" onClick={(e) => e.stopPropagation()}>
                        <div className="modal-header"><h2 className="modal-title">{recipe ? 'Edit Recipe' : 'Add Recipe'}</h2><button className="close-btn" onClick={onClose}>✕</button></div>
                        <div className="simple-recipe-toggle">
                            <div className={`toggle-switch ${formData.is_simple ? 'active' : ''}`} onClick={() => setFormData({ ...formData, is_simple: !formData.is_simple })}><div className="toggle-slider"></div></div>
                            <span>Simple meal entry (no ingredients/steps needed)</span>
                        </div>
                        <div className="form-row">
                            <div className="input-group"><label className="input-label">Recipe Name *</label><input className="input-field" value={formData.name} onChange={(e) => setFormData({ ...formData, name: e.target.value })} /></div>
                            <div className="input-group"><label className="input-label">Servings</label><input type="number" className="input-field" value={formData.servings} onChange={(e) => setFormData({ ...formData, servings: parseInt(e.target.value) })} /></div>
                        </div>
                        <div className="form-row">
                            <div className="input-group"><label className="input-label">Prep Time (min)</label><input type="number" className="input-field" value={formData.prep_time} onChange={(e) => setFormData({ ...formData, prep_time: e.target.value })} /></div>
                            <div className="input-group"><label className="input-label">Cook Time (min)</label><input type="number" className="input-field" value={formData.cook_time} onChange={(e) => setFormData({ ...formData, cook_time: e.target.value })} /></div>
                        </div>
                        <div className="input-group"><label className="input-label">Image URL</label><input className="input-field" value={formData.image_url} onChange={(e) => setFormData({ ...formData, image_url: e.target.value })} /></div>
                        <div className="input-group"><label className="input-label">Source</label><input className="input-field" value={formData.source} onChange={(e) => setFormData({ ...formData, source: e.target.value })} /></div>
                        <div className="input-group"><label className="input-label">Collections (comma-separated)</label><input className="input-field" value={formData.collections?.join(', ') || ''} onChange={(e) => setFormData({ ...formData, collections: e.target.value.split(',').map(s => s.trim()).filter(Boolean) })} /></div>
                        <div className="input-group"><label className="input-label">Keywords (comma-separated)</label><input className="input-field" value={formData.keywords?.join(', ') || ''} onChange={(e) => setFormData({ ...formData, keywords: e.target.value.split(',').map(s => s.trim()).filter(Boolean) })} /></div>
                        <h3 style={{ marginTop: '1.5rem', marginBottom: '1rem' }}>Nutrition (per serving)</h3>
                        <div className="form-row">
                            <div className="input-group"><label className="input-label">Calories</label><input type="number" className="input-field" value={formData.nutrition?.calories || 0} onChange={(e) => setFormData({ ...formData, nutrition: { ...formData.nutrition, calories: parseFloat(e.target.value) || 0 } })} /></div>
                            <div className="input-group"><label className="input-label">Protein (g)</label><input type="number" className="input-field" value={formData.nutrition?.protein || 0} onChange={(e) => setFormData({ ...formData, nutrition: { ...formData.nutrition, protein: parseFloat(e.target.value) || 0 } })} /></div>
                        </div>
                        <div className="form-row">
                            <div className="input-group"><label className="input-label">Carbs (g)</label><input type="number" className="input-field" value={formData.nutrition?.carbs || 0} onChange={(e) => setFormData({ ...formData, nutrition: { ...formData.nutrition, carbs: parseFloat(e.target.value) || 0 } })} /></div>
                            <div className="input-group"><label className="input-label">Fat (g)</label><input type="number" className="input-field" value={formData.nutrition?.fat || 0} onChange={(e) => setFormData({ ...formData, nutrition: { ...formData.nutrition, fat: parseFloat(e.target.value) || 0 } })} /></div>
                        </div>
                        <div className="form-row">
                            <div className="input-group"><label className="input-label">Fiber (g)</label><input type="number" className="input-field" value={formData.nutrition?.fiber || 0} onChange={(e) => setFormData({ ...formData, nutrition: { ...formData.nutrition, fiber: parseFloat(e.target.value) || 0 } })} /></div>
                            <div className="input-group"><label className="input-label">Sugar (g)</label><input type="number" className="input-field" value={formData.nutrition?.sugar || 0} onChange={(e) => setFormData({ ...formData, nutrition: { ...formData.nutrition, sugar: parseFloat(e.target.value) || 0 } })} /></div>
                        </div>
                        <div className="input-group"><label className="input-label">Salt (mg)</label><input type="number" className="input-field" value={formData.nutrition?.salt || 0} onChange={(e) => setFormData({ ...formData, nutrition: { ...formData.nutrition, salt: parseFloat(e.target.value) || 0 } })} /></div>
                        {!formData.is_simple && (
                            <>
                                <h3 style={{ marginTop: '1.5rem', marginBottom: '1rem' }}>Ingredients</h3>
                                {formData.ingredients?.map((ing, idx) => (
                                    <div key={idx} className="form-row" style={{ marginBottom: '0.5rem' }}>
                                        <input className="input-field" placeholder="Amount" value={ing.amount} onChange={(e) => { const newIngs = [...formData.ingredients]; newIngs[idx].amount = e.target.value; setFormData({ ...formData, ingredients: newIngs }); }} />
                                        <input className="input-field" placeholder="Item" value={ing.item} onChange={(e) => { const newIngs = [...formData.ingredients]; newIngs[idx].item = e.target.value; setFormData({ ...formData, ingredients: newIngs }); }} />
                                    </div>
                                ))}
                                <button className="btn btn-secondary" onClick={() => setFormData({ ...formData, ingredients: [...formData.ingredients, { item: '', amount: '' }] })} style={{ marginTop: '0.5rem' }}>+ Add Ingredient</button>
                                <h3 style={{ marginTop: '1.5rem', marginBottom: '1rem' }}>Steps</h3>
                                {formData.steps?.map((step, idx) => (
                                    <div key={idx} className="input-group">
                                        <textarea className="input-field" placeholder={`Step ${idx + 1}`} value={step} onChange={(e) => { const newSteps = [...formData.steps]; newSteps[idx] = e.target.value; setFormData({ ...formData, steps: newSteps }); }} />
                                    </div>
                                ))}
                                <button className="btn btn-secondary" onClick={() => setFormData({ ...formData, steps: [...formData.steps, ''] })}>+ Add Step</button>
                            </>
                        )}
                        <div className="input-group" style={{ marginTop: '1.5rem' }}><label className="input-label">Notes</label><textarea className="input-field" value={formData.notes} onChange={(e) => setFormData({ ...formData, notes: e.target.value })} /></div>
                        <div className="action-buttons"><button className="btn btn-primary" onClick={handleSave}>Save Recipe</button><button className="btn btn-secondary" onClick={onClose}>Cancel</button></div>
                    </div>
                </div>
            );
        }

        function RecipeDetailModal({ recipe, onClose, onEdit, onDelete, reloadMealPlans }) {
            const [servings, setServings] = useState(recipe.servings || 1);
            const [showMealPlanSelector, setShowMealPlanSelector] = useState(false);

            const scaleAmount = (amount) => {
                const multiplier = servings / (recipe.servings || 1);
                const match = amount.match(/(\d+\.?\d*)/);
                if (match) { const num = parseFloat(match[1]); const scaled = (num * multiplier).toFixed(2).replace(/\.?0+$/, ''); return amount.replace(match[1], scaled); }
                return amount;
            };

            const handlePrint = () => {
                const printWindow = window.open('', '', 'width=800,height=600');
                const printContent = `<!DOCTYPE html><html><head><title>${recipe.name}</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { font-family: Arial, sans-serif; padding: 0.8cm; max-width: 19cm; margin: 0 auto; color: #000; font-size: 10pt; line-height: 1.4; } h1 { font-size: 1.5rem; margin-bottom: 0.4cm; color: #1a5f3d; border-bottom: 2px solid #1a5f3d; padding-bottom: 0.2cm; } .meta { font-size: 0.9rem; color: #666; margin-bottom: 0.5cm; } .meta span { margin-right: 1rem; } .header-section { display: grid; grid-template-columns: 6cm 1fr; gap: 0.6cm; margin-bottom: 0.6cm; } .header-section img { width: 100%; height: auto; max-height: 5cm; object-fit: cover; border-radius: 4px; } .notes-box { background: #f9f9f9; padding: 0.5cm; border-radius: 4px; border-left: 3px solid #1a5f3d; } .notes-box h3 { font-size: 1rem; margin-bottom: 0.3cm; color: #1a5f3d; } .notes-box p { font-size: 0.9rem; color: #333; line-height: 1.4; } .ingredients-section { margin-bottom: 0.8cm; page-break-after: always; min-height: 12cm; } .instructions-section { page-break-before: always; } h3 { font-size: 1.2rem; margin-bottom: 0.4cm; color: #1a5f3d; border-bottom: 1px solid #1a5f3d; padding-bottom: 0.15cm; } .servings-info { font-size: 0.9rem; color: #666; margin-bottom: 0.4cm; font-style: italic; } ul { padding-left: 0; list-style: none; } ul li { padding: 0.25cm 0; border-bottom: 0.5px solid #eee; font-size: 0.95rem; } ul li:before { content: "▪"; color: #1a5f3d; font-weight: bold; margin-right: 0.4cm; } ol { padding-left: 1.2cm; counter-reset: item; list-style: none; } ol li { counter-increment: item; margin-bottom: 0.5cm; font-size: 0.95rem; line-height: 1.5; position: relative; } ol li:before { content: counter(item); background: #1a5f3d; color: white; font-weight: bold; font-size: 0.8rem; width: 1.4em; height: 1.4em; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; margin-right: 0.4cm; position: absolute; left: -1.2cm; } @page { size: A4 portrait; margin: 0.8cm; }</style></head><body><h1>${recipe.name}</h1><div class="meta">${recipe.prep_time ? `<span>⏱️ Prep: ${recipe.prep_time} min</span>` : ''}${recipe.cook_time ? `<span>🍳 Cook: ${recipe.cook_time} min</span>` : ''}${recipe.source ? `<span>📚 ${recipe.source}</span>` : ''}</div>${recipe.image_url || recipe.notes ? `<div class="header-section">${recipe.image_url ? `<img src="${recipe.image_url}" alt="${recipe.name}">` : '<div></div>'}${recipe.notes ? `<div class="notes-box"><h3>Notes</h3><p>${recipe.notes}</p></div>` : '<div></div>'}</div>` : ''}${!recipe.is_simple && recipe.ingredients && recipe.ingredients.length > 0 ? `<div class="ingredients-section"><h3>Ingredients</h3><div class="servings-info">For ${servings} servings</div><ul>${recipe.ingredients.map(ing => `<li><strong>${scaleAmount(ing.amount)}</strong> ${ing.item}</li>`).join('')}</ul></div>` : ''}${!recipe.is_simple && recipe.steps && recipe.steps.length > 0 ? `<div class="instructions-section"><h3>Instructions</h3><ol>${recipe.steps.map(step => `<li>${step}</li>`).join('')}</ol></div>` : ''}</body></html>`;
                printWindow.document.write(printContent);
                printWindow.document.close();
                printWindow.onload = function() { printWindow.print(); printWindow.onafterprint = function() { printWindow.close(); }; };
            };

            const addToMealPlan = async (date, mealType) => {
                await supabase.from('meal_plans').insert({ date: formatDate(date), meal_type: mealType, data_type: 'recipe', recipe_id: recipe.id, custom_text: null });
                alert(`Added ${recipe.name} to ${mealType} on ${getDayName(date)}`);
                setShowMealPlanSelector(false);
                if (reloadMealPlans) reloadMealPlans();
            };

            const handleDuplicate = async () => {
                try {
                    const { id, created_at, updated_at, ...recipeCopy } = recipe;
                    recipeCopy.name = `${recipe.name} (Copy)`;
                    const { error } = await supabase.from('recipes').insert(recipeCopy).select();
                    if (error) { alert(`Error duplicating recipe: ${error.message}`); return; }
                    alert(`Recipe duplicated successfully as "${recipeCopy.name}"`);
                    onClose(); window.location.reload();
                } catch (err) { alert(`Exception: ${err.message}`); }
            };

            return (
                <div className="modal-overlay" onClick={onClose}>
                    <div className="modal recipe-print-view" onClick={(e) => e.stopPropagation()}>
                        <div className="modal-header"><h2 className="modal-title">{recipe.name}</h2><button className="close-btn" onClick={onClose} style={{ fontSize: '2rem', padding: '0.5rem' }}>✕</button></div>
                        <div className="action-buttons" style={{ marginTop: 0, marginBottom: '1rem' }}>
                            <button className="btn btn-secondary" onClick={(e) => { e.stopPropagation(); onClose(); }} style={{ width: '100%' }}>← Back to Recipes</button>
                        </div>
                        {recipe.image_url && <img src={recipe.image_url} alt={recipe.name} style={{ width: '100%', borderRadius: '8px', marginBottom: '1rem' }} />}
                        <div className="recipe-meta" style={{ fontSize: '1rem', marginBottom: '1rem' }}>
                            {recipe.prep_time && <span>⏱️ Prep: {recipe.prep_time} min</span>}
                            {recipe.cook_time && <span>🍳 Cook: {recipe.cook_time} min</span>}
                            {recipe.source && <span>📚 {recipe.source}</span>}
                        </div>
                        {recipe.nutrition && (
                            <div className="card" style={{ marginBottom: '1rem' }}>
                                <h3 style={{ marginBottom: '0.5rem' }}>Nutrition (per serving)</h3>
                                <div className="nutrition-summary">
                                    <div className="nutrition-item"><div className="nutrition-value">{recipe.nutrition.calories}</div><div className="nutrition-label">Calories</div></div>
                                    <div className="nutrition-item"><div className="nutrition-value">{recipe.nutrition.protein}g</div><div className="nutrition-label">Protein</div></div>
                                    <div className="nutrition-item"><div className="nutrition-value">{recipe.nutrition.carbs}g</div><div className="nutrition-label">Carbs</div></div>
                                    <div className="nutrition-item"><div className="nutrition-value">{recipe.nutrition.fat}g</div><div className="nutrition-label">Fat</div></div>
                                    {recipe.nutrition.fiber > 0 && <div className="nutrition-item"><div className="nutrition-value">{recipe.nutrition.fiber}g</div><div className="nutrition-label">Fiber</div></div>}
                                    {recipe.nutrition.sugar > 0 && <div className="nutrition-item"><div className="nutrition-value">{recipe.nutrition.sugar}g</div><div className="nutrition-label">Sugar</div></div>}
                                    {recipe.nutrition.salt > 0 && <div className="nutrition-item"><div className="nutrition-value">{recipe.nutrition.salt}mg</div><div className="nutrition-label">Salt</div></div>}
                                </div>
                            </div>
                        )}
                        {!recipe.is_simple && recipe.ingredients && recipe.ingredients.length > 0 && (
                            <div className="ingredients-section" style={{ marginBottom: '1.5rem' }}>
                                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1rem' }}>
                                    <h3>Ingredients</h3>
                                    <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem' }}>
                                        <label>Servings:</label>
                                        <input type="number" value={servings} onChange={(e) => setServings(parseInt(e.target.value) || 1)} style={{ width: '60px', padding: '0.25rem', borderRadius: '4px', border: '2px solid var(--border)' }} />
                                    </div>
                                </div>
                                <ul style={{ listStyle: 'none' }}>
                                    {recipe.ingredients.map((ing, idx) => <li key={idx} style={{ padding: '0.5rem 0', borderBottom: '1px solid var(--border)' }}><strong>{scaleAmount(ing.amount)}</strong> {ing.item}</li>)}
                                </ul>
                            </div>
                        )}
                        {!recipe.is_simple && recipe.steps && recipe.steps.length > 0 && (
                            <div className="steps-section" style={{ marginBottom: '1.5rem' }}>
                                <h3 style={{ marginBottom: '1rem' }}>Instructions</h3>
                                <ol style={{ paddingLeft: '1.5rem' }}>{recipe.steps.map((step, idx) => <li key={idx} style={{ marginBottom: '1rem' }}>{step}</li>)}</ol>
                            </div>
                        )}
                        {recipe.notes && <div style={{ marginBottom: '1.5rem' }}><h3 style={{ marginBottom: '0.5rem' }}>Notes</h3><p style={{ color: 'var(--text-light)' }}>{recipe.notes}</p></div>}
                        <div className="action-buttons">
                            <button className="btn btn-accent" onClick={(e) => { e.stopPropagation(); setShowMealPlanSelector(true); }}>📅 Add to Meal Plan</button>
                            <button className="btn btn-primary" onClick={(e) => { e.stopPropagation(); onEdit(); }}>✏️ Edit</button>
                            <button className="btn btn-secondary" onClick={(e) => { e.stopPropagation(); handleDuplicate(); }}>📋 Duplicate</button>
                            <button className="btn btn-secondary" onClick={(e) => { e.stopPropagation(); handlePrint(); }}>🖨️ Print</button>
                            <button className="btn btn-secondary" onClick={(e) => { e.stopPropagation(); onDelete(); }} style={{ background: 'var(--error)', color: 'white' }}>🗑️ Delete</button>
                        </div>
                        {showMealPlanSelector && <MealPlanSelectorModal recipeName={recipe.name} onSelect={addToMealPlan} onClose={() => setShowMealPlanSelector(false)} />}
                    </div>
                </div>
            );
        }

        function MealPlanning({ recipes, mealPlans, reload }) {
            const [selectedDate, setSelectedDate] = useState(null);
            const [selectedMealType, setSelectedMealType] = useState(null);
            const [showRecipeSelector, setShowRecipeSelector] = useState(false);
            const [showExtrasModal, setShowExtrasModal] = useState(false);
            const dates = getNextTwoWeeks();

            const getMealsForDate = (date) => mealPlans.filter(mp => mp.date === formatDate(date));

            const addMeal = async (date, mealType, recipeId, customText) => {
                await supabase.from('meal_plans').insert({ date: formatDate(date), meal_type: mealType, data_type: recipeId ? 'recipe' : 'custom', recipe_id: recipeId, custom_text: customText });
                reload(); setShowRecipeSelector(false);
            };

            const deleteMeal = async (mealId) => { await supabase.from('meal_plans').delete().eq('id', mealId); reload(); };

            return (
                <div>
                    <div className="page-header"><h1 className="page-title">Meal Planning</h1><p className="page-subtitle">Plan your meals for the next 2 weeks</p></div>
                    <div className="meal-plan-grid">
                        {dates.map((date, idx) => {
                            const meals = getMealsForDate(date);
                            const breakfast = meals.find(m => m.meal_type === 'breakfast');
                            const lunch = meals.find(m => m.meal_type === 'lunch');
                            const dinner = meals.find(m => m.meal_type === 'dinner');
                            const snacks = meals.filter(m => m.meal_type === 'snack');

                            const dayNutrition = { calories: 0, protein: 0, carbs: 0, fat: 0 };
                            meals.forEach(meal => {
                                if (meal.data_type === 'recipe' && meal.recipe_id) {
                                    const recipe = recipes.find(r => r.id === meal.recipe_id);
                                    if (recipe && recipe.nutrition) {
                                        dayNutrition.calories += recipe.nutrition.calories || 0;
                                        dayNutrition.protein += recipe.nutrition.protein || 0;
                                        dayNutrition.carbs += recipe.nutrition.carbs || 0;
                                        dayNutrition.fat += recipe.nutrition.fat || 0;
                                    }
                                }
                            });

                            const MealSlot = ({ label, meal }) => (
                                <div className="meal-slot">
                                    <div className="meal-type">{label}</div>
                                    {meal ? (
                                        <div>
                                            <div style={{ fontWeight: '600' }}>{meal.data_type === 'recipe' ? recipes.find(r => r.id === meal.recipe_id)?.name : meal.custom_text}</div>
                                            <button className="btn btn-secondary" onClick={() => deleteMeal(meal.id)} style={{ marginTop: '0.5rem', padding: '0.25rem 0.75rem', fontSize: '0.85rem' }}>Remove</button>
                                        </div>
                                    ) : (
                                        <button className="btn btn-primary" onClick={() => { setSelectedDate(date); setSelectedMealType(label.toLowerCase()); setShowRecipeSelector(true); }} style={{ padding: '0.5rem 1rem', fontSize: '0.85rem' }}>+ Add Meal</button>
                                    )}
                                </div>
                            );

                            return (
                                <div key={idx} className="day-card">
                                    <div className="day-header">{getDayName(date)}</div>
                                    {meals.length > 0 && (
                                        <div style={{ background: 'var(--primary-light)', color: 'white', padding: '0.5rem', borderRadius: '6px', marginBottom: '0.75rem', fontSize: '0.85rem', display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '0.25rem' }}>
                                            <div><strong>{Math.round(dayNutrition.calories)}</strong> cal</div>
                                            <div><strong>{Math.round(dayNutrition.protein)}g</strong> protein</div>
                                            <div><strong>{Math.round(dayNutrition.carbs)}g</strong> carbs</div>
                                            <div><strong>{Math.round(dayNutrition.fat)}g</strong> fat</div>
                                        </div>
                                    )}
                                    <MealSlot label="Breakfast" meal={breakfast} />
                                    <MealSlot label="Lunch" meal={lunch} />
                                    <MealSlot label="Dinner" meal={dinner} />

                                    {/* Snacks section */}
                                    <div className="meal-slot">
                                        <div className="meal-type">Snacks</div>
                                        {snacks.length > 0 && (
                                            <div style={{ marginBottom: '0.5rem' }}>
                                                {snacks.map(snack => (
                                                    <div key={snack.id} className="snack-item">
                                                        <span>{snack.data_type === 'recipe' ? recipes.find(r => r.id === snack.recipe_id)?.name : snack.custom_text}</span>
                                                        <button className="btn btn-secondary" onClick={() => deleteMeal(snack.id)} style={{ padding: '0.15rem 0.5rem', fontSize: '0.8rem' }}>✕</button>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                        <button className="btn btn-primary" onClick={() => { setSelectedDate(date); setSelectedMealType('snack'); setShowRecipeSelector(true); }} style={{ padding: '0.5rem 1rem', fontSize: '0.85rem' }}>+ Add Snack</button>
                                    </div>

                                    <button className="btn btn-accent" onClick={() => { setSelectedDate(date); setShowExtrasModal(true); }} style={{ marginTop: '1rem', width: '100%', padding: '0.5rem' }}>+ Add Daily Extras</button>
                                </div>
                            );
                        })}
                    </div>
                    {showRecipeSelector && <RecipeSelectorModal recipes={recipes} onSelect={(recipeId) => addMeal(selectedDate, selectedMealType, recipeId, null)} onCustom={(text) => addMeal(selectedDate, selectedMealType, null, text)} onClose={() => setShowRecipeSelector(false)} mealType={selectedMealType} />}
                    {showExtrasModal && <DailyExtrasModal date={selectedDate} onClose={() => { setShowExtrasModal(false); reload(); }} />}
                </div>
            );
        }

        function RecipeSelectorModal({ recipes, onSelect, onCustom, onClose, mealType }) {
            const [customText, setCustomText] = useState('');
            const [searchTerm, setSearchTerm] = useState('');
            const filteredRecipes = recipes.filter(r => r.name.toLowerCase().includes(searchTerm.toLowerCase()));
            return (
                <div className="modal-overlay" onClick={onClose}>
                    <div className="modal" onClick={(e) => e.stopPropagation()}>
                        <div className="modal-header"><h2 className="modal-title">Add {mealType === 'snack' ? 'Snack' : 'Meal'}</h2><button className="close-btn" onClick={onClose}>✕</button></div>
                        <div className="input-group">
                            <label className="input-label">Custom Entry (e.g., "Piece of fruit")</label>
                            <input className="input-field" value={customText} onChange={(e) => setCustomText(e.target.value)} placeholder="Enter custom text" />
                            <button className="btn btn-primary" onClick={() => onCustom(customText)} disabled={!customText} style={{ marginTop: '0.5rem' }}>Add Custom Entry</button>
                        </div>
                        <div style={{ margin: '1.5rem 0', borderTop: '2px solid var(--border)', paddingTop: '1.5rem' }}>
                            <h3 style={{ marginBottom: '1rem' }}>Or select a recipe:</h3>
                            <input className="input-field" placeholder="Search recipes..." value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />
                            <div style={{ maxHeight: '300px', overflowY: 'auto', marginTop: '1rem' }}>
                                {filteredRecipes.map(recipe => (
                                    <div key={recipe.id} className="quick-food-item" onClick={() => onSelect(recipe.id)} style={{ cursor: 'pointer' }}>
                                        <div>
                                            <div style={{ fontWeight: '600' }}>{recipe.name}</div>
                                            {recipe.nutrition && <div style={{ fontSize: '0.85rem', color: 'var(--text-light)' }}>{recipe.nutrition.calories} cal, {recipe.nutrition.protein}g protein</div>}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function MealPlanSelectorModal({ recipeName, onSelect, onClose }) {
            const [selectedDate, setSelectedDate] = useState(null);
            const [selectedMealType, setSelectedMealType] = useState(null);
            const dates = getNextTwoWeeks();
            return (
                <div className="modal-overlay" onClick={onClose}>
                    <div className="modal" onClick={(e) => e.stopPropagation()} style={{ maxWidth: '600px' }}>
                        <div className="modal-header"><h2 className="modal-title">Add "{recipeName}" to Meal Plan</h2><button className="close-btn" onClick={onClose}>✕</button></div>
                        <div className="input-group">
                            <label className="input-label">Select Date</label>
                            <select className="input-field" value={selectedDate ? formatDate(selectedDate) : ''} onChange={(e) => { const date = dates.find(d => formatDate(d) === e.target.value); setSelectedDate(date); }}>
                                <option value="">Choose a date...</option>
                                {dates.map((date, idx) => <option key={idx} value={formatDate(date)}>{getDayName(date)}</option>)}
                            </select>
                        </div>
                        <div className="input-group">
                            <label className="input-label">Select Meal Type</label>
                            <select className="input-field" value={selectedMealType || ''} onChange={(e) => setSelectedMealType(e.target.value)}>
                                <option value="">Choose meal type...</option>
                                <option value="breakfast">Breakfast</option>
                                <option value="lunch">Lunch</option>
                                <option value="dinner">Dinner</option>
                                <option value="snack">Snack</option>
                            </select>
                        </div>
                        <div className="action-buttons">
                            <button className="btn btn-primary" onClick={() => { if (selectedDate && selectedMealType) onSelect(selectedDate, selectedMealType); }} disabled={!selectedDate || !selectedMealType}>Add to Meal Plan</button>
                            <button className="btn btn-secondary" onClick={onClose}>Cancel</button>
                        </div>
                    </div>
                </div>
            );
        }

        function DailyExtrasModal({ date, onClose }) {
            const [extras, setExtras] = useState([]);
            const [name, setName] = useState('');
            const [calories, setCalories] = useState('');
            const [protein, setProtein] = useState('');
            const [carbs, setCarbs] = useState('');
            const [fat, setFat] = useState('');
            const [fiber, setFiber] = useState('');
            const [sugar, setSugar] = useState('');
            const [salt, setSalt] = useState('');

            useEffect(() => { loadExtras(); }, []);

            const loadExtras = async () => {
                const { data } = await supabase.from('daily_extras').select('*').eq('date', formatDate(date));
                if (data) setExtras(data);
            };

            const addExtra = async () => {
                await supabase.from('daily_extras').insert({ date: formatDate(date), name, calories: parseFloat(calories) || 0, protein: parseFloat(protein) || 0, carbs: parseFloat(carbs) || 0, fat: parseFloat(fat) || 0, fiber: parseFloat(fiber) || 0, sugar: parseFloat(sugar) || 0, salt: parseFloat(salt) || 0 });
                setName(''); setCalories(''); setProtein(''); setCarbs(''); setFat(''); setFiber(''); setSugar(''); setSalt('');
                loadExtras();
            };

            const deleteExtra = async (id) => { await supabase.from('daily_extras').delete().eq('id', id); loadExtras(); };

            return (
                <div className="modal-overlay" onClick={onClose}>
                    <div className="modal" onClick={(e) => e.stopPropagation()}>
                        <div className="modal-header"><h2 className="modal-title">Daily Extras - {getDayName(date)}</h2><button className="close-btn" onClick={onClose}>✕</button></div>
                        <div className="input-group"><label className="input-label">Item Name</label><input className="input-field" value={name} onChange={(e) => setName(e.target.value)} placeholder="e.g., Coffee, Supplement" /></div>
                        <div className="form-row">
                            <div className="input-group"><label className="input-label">Calories</label><input type="number" className="input-field" value={calories} onChange={(e) => setCalories(e.target.value)} /></div>
                            <div className="input-group"><label className="input-label">Protein (g)</label><input type="number" className="input-field" value={protein} onChange={(e) => setProtein(e.target.value)} /></div>
                        </div>
                        <div className="form-row">
                            <div className="input-group"><label className="input-label">Carbs (g)</label><input type="number" className="input-field" value={carbs} onChange={(e) => setCarbs(e.target.value)} /></div>
                            <div className="input-group"><label className="input-label">Fat (g)</label><input type="number" className="input-field" value={fat} onChange={(e) => setFat(e.target.value)} /></div>
                        </div>
                        <div className="form-row">
                            <div className="input-group"><label className="input-label">Fiber (g)</label><input type="number" className="input-field" value={fiber} onChange={(e) => setFiber(e.target.value)} /></div>
                            <div className="input-group"><label className="input-label">Sugar (g)</label><input type="number" className="input-field" value={sugar} onChange={(e) => setSugar(e.target.value)} /></div>
                        </div>
                        <div className="input-group"><label className="input-label">Salt (mg)</label><input type="number" className="input-field" value={salt} onChange={(e) => setSalt(e.target.value)} /></div>
                        <button className="btn btn-primary" onClick={addExtra} disabled={!name}>Add Extra</button>
                        <div style={{ marginTop: '1.5rem' }}>
                            <h3 style={{ marginBottom: '1rem' }}>Added Extras</h3>
                            {extras.map(extra => (
                                <div key={extra.id} className="quick-food-item">
                                    <div>
                                        <div style={{ fontWeight: '600' }}>{extra.name}</div>
