<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RecipeFlow - Test 3</title>
    <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.js"></script>
    <style>
        :root {
            --primary: #1a5f3d;
            --primary-light: #2d8659;
            --primary-dark: #0f3d28;
            --bg: #faf8f5;
            --surface: #ffffff;
            --text: #2c3e50;
            --text-light: #7f8c8d;
            --border: #e8e4df;
            --shadow: rgba(26, 95, 61, 0.08);
            --error: #e74c3c;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); }
        .header-bar { background: var(--primary-dark); color: white; padding: 1.25rem 2rem; font-size: 1.5rem; font-weight: bold; }
        .main-content { padding: 2rem; max-width: 1200px; margin: 0 auto; }
        .search-input { width: 100%; padding: 1rem; border: 2px solid var(--border); border-radius: 12px; font-size: 1rem; margin-bottom: 1rem; }
        .status { color: var(--text-light); margin-bottom: 1rem; }
        .btn { padding: 0.75rem 1.5rem; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 0.95rem; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: white; color: var(--primary); border: 2px solid var(--primary); }
        .action-buttons { display: flex; gap: 1rem; margin-bottom: 1.5rem; }
        .recipe-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1.5rem; }
        .recipe-card { background: var(--surface); border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px var(--shadow); cursor: pointer; }
        .recipe-image { width: 100%; height: 160px; object-fit: cover; background: linear-gradient(135deg, #2d8659, var(--primary)); }
        .recipe-content { padding: 1rem; }
        .recipe-name { font-size: 1.1rem; font-weight: 700; color: var(--primary-dark); margin-bottom: 0.5rem; }
        .recipe-meta { font-size: 0.85rem; color: var(--text-light); }
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 2000; padding: 20px; }
        .modal { background: var(--surface); border-radius: 16px; padding: 2rem; max-width: 700px; max-height: 85vh; overflow-y: auto; width: 100%; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .close-btn { background: none; border: none; font-size: 1.5rem; cursor: pointer; }
        .ingredient-row { padding: 0.5rem 0; border-bottom: 1px solid var(--border); }
        .step-row { margin-bottom: 0.75rem; }
        .input-group { margin-bottom: 1rem; }
        .input-label { display: block; margin-bottom: 0.4rem; font-weight: 600; font-size: 0.9rem; }
        .input-field { width: 100%; padding: 0.65rem; border: 2px solid var(--border); border-radius: 8px; font-size: 0.95rem; font-family: inherit; }
        textarea.input-field { min-height: 70px; resize: vertical; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .ing-row { display: grid; grid-template-columns: 1fr 2fr; gap: 0.5rem; margin-bottom: 0.5rem; }
        .badge { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 20px; font-size: 0.75rem; font-weight: 600; margin-right: 0.4rem; margin-bottom: 0.3rem; }
        .badge-primary { background: var(--primary-light); color: white; }
        .badge-accent { background: #e67e22; color: white; }
        .filter-bar { display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center; margin-bottom: 1rem; background: var(--surface); padding: 1rem; border-radius: 12px; box-shadow: 0 2px 8px var(--shadow); }
    </style>
</head>
<body>
    <div id="root">Loading...</div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const SUPABASE_URL = 'https://hebuaabantmnfdxxkaif.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_xzVfo0l-eLpkP4TuUy17KQ_kLLUUScF';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function App() {
            const [recipes, setRecipes] = useState([]);
            const [status, setStatus] = useState('loading');
            const [searchTerm, setSearchTerm] = useState('');
            const [viewingRecipe, setViewingRecipe] = useState(null);
            const [showFormModal, setShowFormModal] = useState(false);
            const [editingRecipe, setEditingRecipe] = useState(null);
            const [selectedCollection, setSelectedCollection] = useState('all');
            const [selectedKeyword, setSelectedKeyword] = useState('');

            const loadRecipes = () => {
                supabase.from('recipes').select('*').then((result) => {
                    if (result.error) {
                        setStatus('error: ' + result.error.message);
                    } else {
                        setRecipes(result.data);
                        setStatus('loaded');
                    }
                });
            };

            useEffect(() => { loadRecipes(); }, []);

            const allCollections = [...new Set(recipes.flatMap((r) => r.collections || []))].sort();

            const getCollectionCount = (collection) => recipes.filter((r) => r.collections && r.collections.includes(collection)).length;

            const filteredRecipes = recipes.filter((r) => {
                const matchesSearch = !searchTerm ||
                    r.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    (r.keywords && r.keywords.some((k) => k.toLowerCase().includes(searchTerm.toLowerCase())));
                const matchesCollection = selectedCollection === 'all' ||
                    (r.collections && r.collections.includes(selectedCollection));
                const matchesKeyword = !selectedKeyword ||
                    (r.keywords && r.keywords.includes(selectedKeyword));
                return matchesSearch && matchesCollection && matchesKeyword;
            });

            const handleDelete = async (id) => {
                if (!confirm('Delete this recipe?')) return;
                await supabase.from('recipes').delete().eq('id', id);
                setViewingRecipe(null);
                loadRecipes();
            };

            const handleDuplicate = async (recipe) => {
                const copy = Object.assign({}, recipe);
                delete copy.id;
                delete copy.created_at;
                delete copy.updated_at;
                copy.name = recipe.name + ' (Copy)';
                const result = await supabase.from('recipes').insert(copy);
                if (result.error) { alert('Error: ' + result.error.message); return; }
                setViewingRecipe(null);
                loadRecipes();
            };

            const handleExport = () => {
                const dataStr = JSON.stringify(recipes, null, 2);
                const dataBlob = new Blob([dataStr], { type: 'application/json' });
                const url = URL.createObjectURL(dataBlob);
                const link = document.createElement('a');
                link.href = url;
                link.download = 'recipes-export.json';
                link.click();
            };

            const handleImport = () => {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = 'application/json';
                input.onchange = async (e) => {
                    const file = e.target.files[0];
                    const text = await file.text();
                    try {
                        const importedRecipes = JSON.parse(text);
                        const existingNames = recipes.map((r) => r.name.toLowerCase().trim());
                        let added = 0;
                        let skipped = 0;
                        for (const r of importedRecipes) {
                            if (existingNames.includes((r.name || '').toLowerCase().trim())) {
                                skipped++;
                                continue;
                            }
                            const copy = Object.assign({}, r);
                            delete copy.id;
                            await supabase.from('recipes').insert(copy);
                            existingNames.push((r.name || '').toLowerCase().trim());
                            added++;
                        }
                        alert('Import complete: ' + added + ' added, ' + skipped + ' skipped (already existed)');
                        loadRecipes();
                    } catch (err) {
                        alert('Error importing recipes. Please check the file format.');
                    }
                };
                input.click();
            };

            const handlePasteImport = () => {
                const text = prompt('Paste your JSON text here:');
                if (!text) return;
                try {
                    const importedRecipes = JSON.parse(text);
                    (async () => {
                        const existingNames = recipes.map((r) => r.name.toLowerCase().trim());
                        let added = 0;
                        let skipped = 0;
                        for (const r of importedRecipes) {
                            if (existingNames.includes((r.name || '').toLowerCase().trim())) {
                                skipped++;
                                continue;
                            }
                            const copy = Object.assign({}, r);
                            delete copy.id;
                            await supabase.from('recipes').insert(copy);
                            existingNames.push((r.name || '').toLowerCase().trim());
                            added++;
                        }
                        alert('Import complete: ' + added + ' added, ' + skipped + ' skipped (already existed)');
                        loadRecipes();
                    })();
                } catch (err) {
                    alert('Error importing recipes. Please check the JSON format.');
                }
            };

            return (
                <div>
                    <div className="header-bar">🍳 RecipeFlow</div>
                    <div className="main-content">
                        <input
                            type="text"
                            className="search-input"
                            placeholder="Search recipes..."
                            value={searchTerm}
                            onChange={(e) => setSearchTerm(e.target.value)}
                        />
                        <div className="status">Status: {status} — showing {filteredRecipes.length} of {recipes.length} recipes</div>

                        <div className="action-buttons">
                            <button className="btn btn-primary" onClick={() => { setEditingRecipe(null); setShowFormModal(true); }}>+ Add Recipe</button>
                            <button className="btn btn-secondary" onClick={handleImport}>📥 Import File</button>
                            <button className="btn btn-secondary" onClick={handlePasteImport}>📋 Paste JSON</button>
                            <button className="btn btn-secondary" onClick={handleExport}>📤 Export</button>
                        </div>

                        {allCollections.length > 0 && (
                            <div className="filter-bar">
                                <span style={{ fontWeight: '600', marginRight: '0.5rem' }}>Collections:</span>
                                <button
                                    className={'btn ' + (selectedCollection === 'all' ? 'btn-primary' : 'btn-secondary')}
                                    onClick={() => { setSelectedCollection('all'); setSelectedKeyword(''); }}
                                    style={{ padding: '0.4rem 0.9rem', fontSize: '0.85rem' }}
                                >
                                    All ({recipes.length})
                                </button>
                                {allCollections.map((collection) => (
                                    <button
                                        key={collection}
                                        className={'btn ' + (selectedCollection === collection ? 'btn-primary' : 'btn-secondary')}
                                        onClick={() => { setSelectedCollection(collection); setSelectedKeyword(''); }}
                                        style={{ padding: '0.4rem 0.9rem', fontSize: '0.85rem' }}
                                    >
                                        {collection} ({getCollectionCount(collection)})
                                    </button>
                                ))}
                            </div>
                        )}

                        {(selectedCollection !== 'all' || selectedKeyword) && (
                            <div style={{ marginBottom: '1rem', display: 'flex', gap: '0.5rem', flexWrap: 'wrap', alignItems: 'center' }}>
                                <span style={{ color: 'var(--text-light)', fontSize: '0.85rem' }}>Active filters:</span>
                                {selectedCollection !== 'all' && (
                                    <span className="badge badge-primary" style={{ cursor: 'pointer' }} onClick={() => setSelectedCollection('all')}>
                                        {selectedCollection} ✕
                                    </span>
                                )}
                                {selectedKeyword && (
                                    <span className="badge badge-accent" style={{ cursor: 'pointer' }} onClick={() => setSelectedKeyword('')}>
                                        {selectedKeyword} ✕
                                    </span>
                                )}
                            </div>
                        )}

                        <div className="recipe-grid">
                            {filteredRecipes.map((recipe) => (
                                <div key={recipe.id} className="recipe-card" onClick={() => setViewingRecipe(recipe)}>
                                    {recipe.image_url ? (
                                        <img src={recipe.image_url} alt={recipe.name} className="recipe-image" />
                                    ) : (
                                        <div className="recipe-image"></div>
                                    )}
                                    <div className="recipe-content">
                                        <div className="recipe-name">{recipe.name}</div>
                                        <div className="recipe-meta">
                                            {recipe.nutrition && recipe.nutrition.calories ? recipe.nutrition.calories + ' cal' : ''}
                                        </div>
                                        {recipe.collections && recipe.collections.length > 0 && (
                                            <div style={{ marginTop: '0.5rem' }}>
                                                {recipe.collections.map((col, idx) => (
                                                    <span key={idx} className="badge badge-primary">{col}</span>
                                                ))}
                                            </div>
                                        )}
                                        {recipe.keywords && recipe.keywords.length > 0 && (
                                            <div style={{ marginTop: '0.4rem' }}>
                                                {recipe.keywords.map((keyword, idx) => (
                                                    <span
                                                        key={idx}
                                                        className="badge badge-accent"
                                                        onClick={(e) => { e.stopPropagation(); setSelectedKeyword(keyword); setSelectedCollection('all'); }}
                                                        style={{ cursor: 'pointer' }}
                                                        title={'Filter by ' + keyword}
                                                    >
                                                        🔍 {keyword}
                                                    </span>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>

                    {viewingRecipe && (
                        <RecipeDetail
                            recipe={viewingRecipe}
                            onClose={() => setViewingRecipe(null)}
                            onEdit={() => { setEditingRecipe(viewingRecipe); setViewingRecipe(null); setShowFormModal(true); }}
                            onDelete={() => handleDelete(viewingRecipe.id)}
                            onDuplicate={() => handleDuplicate(viewingRecipe)}
                        />
                    )}

                    {showFormModal && (
                        <RecipeForm
                            recipe={editingRecipe}
                            onClose={() => setShowFormModal(false)}
                            onSave={loadRecipes}
                        />
                    )}
                </div>
            );
        }

        function RecipeDetail({ recipe, onClose, onEdit, onDelete, onDuplicate }) {
            const handlePrint = () => {
                const printWindow = window.open('', '', 'width=800,height=600');
                let ingredientsHtml = '';
                if (recipe.ingredients && recipe.ingredients.length > 0) {
                    ingredientsHtml = '<h3>Ingredients</h3><ul>' +
                        recipe.ingredients.map(function(ing) { return '<li><strong>' + ing.amount + '</strong> ' + ing.item + '</li>'; }).join('') +
                        '</ul>';
                }
                let stepsHtml = '';
                if (recipe.steps && recipe.steps.length > 0) {
                    stepsHtml = '<h3>Steps</h3><ol>' +
                        recipe.steps.map(function(step) { return '<li>' + step + '</li>'; }).join('') +
                        '</ol>';
                }
                const printCss = 'body { font-family: Arial, sans-serif; padding: 1cm; color: #000; } h1 { color: #1a5f3d; border-bottom: 2px solid #1a5f3d; padding-bottom: 0.2cm; } h3 { color: #1a5f3d; margin-top: 0.6cm; } li { padding: 0.2cm 0; }';
                const printContent = '<!DOCTYPE html><html><head><title>' + recipe.name + '</title><style>' + printCss + '</style></head><body><h1>' + recipe.name + '</h1>' + ingredientsHtml + stepsHtml + '</body></html>';
                printWindow.document.write(printContent);
                printWindow.document.close();
                printWindow.onload = function() {
                    printWindow.print();
                    printWindow.onafterprint = function() { printWindow.close(); };
                };
            };

            return (
                <div className="modal-overlay" onClick={onClose}>
                    <div className="modal" onClick={(e) => e.stopPropagation()}>
                        <div className="modal-header">
                            <h2>{recipe.name}</h2>
                            <button className="close-btn" onClick={onClose}>✕</button>
                        </div>

                        {recipe.image_url && (
                            <img src={recipe.image_url} alt={recipe.name} style={{ width: '100%', borderRadius: '8px', marginBottom: '1rem' }} />
                        )}

                        {recipe.ingredients && recipe.ingredients.length > 0 && (
                            <div style={{ marginBottom: '1.5rem' }}>
                                <h3 style={{ marginBottom: '0.5rem' }}>Ingredients</h3>
                                {recipe.ingredients.map((ing, idx) => (
                                    <div key={idx} className="ingredient-row">
                                        <strong>{ing.amount}</strong> {ing.item}
                                    </div>
                                ))}
                            </div>
                        )}

                        {recipe.steps && recipe.steps.length > 0 && (
                            <div style={{ marginBottom: '1.5rem' }}>
                                <h3 style={{ marginBottom: '0.5rem' }}>Steps</h3>
                                {recipe.steps.map((step, idx) => (
                                    <div key={idx} className="step-row">{idx + 1}. {step}</div>
                                ))}
                            </div>
                        )}

                        <div className="action-buttons" style={{ marginBottom: 0, flexWrap: 'wrap' }}>
                            <button className="btn btn-primary" onClick={onEdit}>✏️ Edit</button>
                            <button className="btn btn-secondary" onClick={onDuplicate}>📋 Duplicate</button>
                            <button className="btn btn-secondary" onClick={handlePrint}>🖨️ Print</button>
                            <button className="btn btn-secondary" onClick={onDelete} style={{ background: 'var(--error)', color: 'white', border: 'none' }}>🗑️ Delete</button>
                        </div>
                    </div>
                </div>
            );
        }

        function RecipeForm({ recipe, onClose, onSave }) {
            const [formData, setFormData] = useState(recipe || {
                name: '', servings: 1, prep_time: null, cook_time: null, source: '', image_url: '',
                collections: [], keywords: [], ingredients: [], steps: [], notes: '',
                nutrition: { calories: 0, protein: 0, carbs: 0, fat: 0, fiber: 0, sugar: 0, salt: 0 },
                is_simple: false
            });

            const updateIngredient = (idx, field, value) => {
                const newIngs = [...formData.ingredients];
                newIngs[idx] = { ...newIngs[idx], [field]: value };
                setFormData({ ...formData, ingredients: newIngs });
            };

            const addIngredient = () => {
                setFormData({ ...formData, ingredients: [...formData.ingredients, { item: '', amount: '' }] });
            };

            const updateStep = (idx, value) => {
                const newSteps = [...formData.steps];
                newSteps[idx] = value;
                setFormData({ ...formData, steps: newSteps });
            };

            const addStep = () => {
                setFormData({ ...formData, steps: [...formData.steps, ''] });
            };

            const handleSave = async () => {
                if (!formData.name) { alert('Please enter a recipe name'); return; }

                const sanitizedData = {
                    name: formData.name,
                    servings: parseInt(formData.servings) || 1,
                    prep_time: formData.prep_time ? parseInt(formData.prep_time) : null,
                    cook_time: formData.cook_time ? parseInt(formData.cook_time) : null,
                    source: formData.source || '',
                    image_url: formData.image_url || '',
                    collections: Array.isArray(formData.collections) ? formData.collections : [],
                    keywords: Array.isArray(formData.keywords) ? formData.keywords : [],
                    ingredients: Array.isArray(formData.ingredients) ? formData.ingredients : [],
                    steps: Array.isArray(formData.steps) ? formData.steps : [],
                    notes: formData.notes || '',
                    nutrition: {
                        calories: parseFloat(formData.nutrition.calories) || 0,
                        protein: parseFloat(formData.nutrition.protein) || 0,
                        carbs: parseFloat(formData.nutrition.carbs) || 0,
                        fat: parseFloat(formData.nutrition.fat) || 0,
                        fiber: parseFloat(formData.nutrition.fiber) || 0,
                        sugar: parseFloat(formData.nutrition.sugar) || 0,
                        salt: parseFloat(formData.nutrition.salt) || 0
                    },
                    is_simple: Boolean(formData.is_simple)
                };

                if (recipe) {
                    const result = await supabase.from('recipes').update(sanitizedData).eq('id', recipe.id);
                    if (result.error) { alert('Error: ' + result.error.message); return; }
                } else {
                    const result = await supabase.from('recipes').insert(sanitizedData);
                    if (result.error) { alert('Error: ' + result.error.message); return; }
                }

                onSave();
                onClose();
            };

            return (
                <div className="modal-overlay" onClick={onClose}>
                    <div className="modal" onClick={(e) => e.stopPropagation()}>
                        <div className="modal-header">
                            <h2>{recipe ? 'Edit Recipe' : 'Add Recipe'}</h2>
                            <button className="close-btn" onClick={onClose}>✕</button>
                        </div>

                        <div className="form-row">
                            <div className="input-group">
                                <label className="input-label">Recipe Name *</label>
                                <input className="input-field" value={formData.name} onChange={(e) => setFormData({ ...formData, name: e.target.value })} />
                            </div>
                            <div className="input-group">
                                <label className="input-label">Servings</label>
                                <input type="number" className="input-field" value={formData.servings} onChange={(e) => setFormData({ ...formData, servings: e.target.value })} />
                            </div>
                        </div>

                        <div className="form-row">
                            <div className="input-group">
                                <label className="input-label">Prep Time (min)</label>
                                <input type="number" className="input-field" value={formData.prep_time || ''} onChange={(e) => setFormData({ ...formData, prep_time: e.target.value })} />
                            </div>
                            <div className="input-group">
                                <label className="input-label">Cook Time (min)</label>
                                <input type="number" className="input-field" value={formData.cook_time || ''} onChange={(e) => setFormData({ ...formData, cook_time: e.target.value })} />
                            </div>
                        </div>

                        <div className="input-group">
                            <label className="input-label">Image URL</label>
                            <input className="input-field" value={formData.image_url} onChange={(e) => setFormData({ ...formData, image_url: e.target.value })} />
                        </div>

                        <div className="input-group">
                            <label className="input-label">Source</label>
                            <input className="input-field" value={formData.source} onChange={(e) => setFormData({ ...formData, source: e.target.value })} />
                        </div>

                        <div className="input-group">
                            <label className="input-label">Collections (comma-separated)</label>
                            <input className="input-field" value={(formData.collections || []).join(', ')} onChange={(e) => setFormData({ ...formData, collections: e.target.value.split(',').map((s) => s.trim()).filter(Boolean) })} />
                        </div>

                        <div className="input-group">
                            <label className="input-label">Keywords (comma-separated)</label>
                            <input className="input-field" value={(formData.keywords || []).join(', ')} onChange={(e) => setFormData({ ...formData, keywords: e.target.value.split(',').map((s) => s.trim()).filter(Boolean) })} />
                        </div>

                        <h3 style={{ marginBottom: '0.75rem' }}>Nutrition (per serving)</h3>
                        <div className="form-row">
                            <div className="input-group">
                                <label className="input-label">Calories</label>
                                <input type="number" className="input-field" value={formData.nutrition.calories} onChange={(e) => setFormData({ ...formData, nutrition: { ...formData.nutrition, calories: e.target.value } })} />
                            </div>
                            <div className="input-group">
                                <label className="input-label">Protein (g)</label>
                                <input type="number" className="input-field" value={formData.nutrition.protein} onChange={(e) => setFormData({ ...formData, nutrition: { ...formData.nutrition, protein: e.target.value } })} />
                            </div>
                        </div>
                        <div className="form-row">
                            <div className="input-group">
                                <label className="input-label">Carbs (g)</label>
                                <input type="number" className="input-field" value={formData.nutrition.carbs} onChange={(e) => setFormData({ ...formData, nutrition: { ...formData.nutrition, carbs: e.target.value } })} />
                            </div>
                            <div className="input-group">
                                <label className="input-label">Fat (g)</label>
                                <input type="number" className="input-field" value={formData.nutrition.fat} onChange={(e) => setFormData({ ...formData, nutrition: { ...formData.nutrition, fat: e.target.value } })} />
                            </div>
                        </div>

                        <h3 style={{ marginBottom: '0.75rem' }}>Ingredients</h3>
                        {formData.ingredients.map((ing, idx) => (
                            <div key={idx} className="ing-row">
                                <input className="input-field" placeholder="Amount" value={ing.amount} onChange={(e) => updateIngredient(idx, 'amount', e.target.value)} />
                                <input className="input-field" placeholder="Item" value={ing.item} onChange={(e) => updateIngredient(idx, 'item', e.target.value)} />
                            </div>
                        ))}
                        <button className="btn btn-secondary" onClick={addIngredient} style={{ marginBottom: '1.5rem' }}>+ Add Ingredient</button>

                        <h3 style={{ marginBottom: '0.75rem' }}>Steps</h3>
                        {formData.steps.map((step, idx) => (
                            <div key={idx} className="input-group">
                                <textarea className="input-field" placeholder={'Step ' + (idx + 1)} value={step} onChange={(e) => updateStep(idx, e.target.value)} />
                            </div>
                        ))}
                        <button className="btn btn-secondary" onClick={addStep} style={{ marginBottom: '1.5rem' }}>+ Add Step</button>

                        <div className="input-group">
                            <label className="input-label">Notes</label>
                            <textarea className="input-field" value={formData.notes} onChange={(e) => setFormData({ ...formData, notes: e.target.value })} />
                        </div>

                        <div className="action-buttons" style={{ marginBottom: 0 }}>
                            <button className="btn btn-primary" onClick={handleSave}>Save Recipe</button>
                            <button className="btn btn-secondary" onClick={onClose}>Cancel</button>
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
