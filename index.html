<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RecipeFlow - Your Recipe Collection</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍳</text></svg>">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a5f3d;
            --primary-light: #2d8659;
            --primary-dark: #0f3d28;
            --accent: #e67e22;
            --accent-light: #f39c12;
            --bg: #faf8f5;
            --surface: #ffffff;
            --text: #2c3e50;
            --text-light: #7f8c8d;
            --border: #e8e4df;
            --shadow: rgba(26, 95, 61, 0.08);
            --error: #e74c3c;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
        h1, h2, h3, h4, h5 { font-family: 'Crimson Pro', serif; font-weight: 700; }

        .header-bar { background: var(--primary-dark); color: white; padding: 1.25rem 2rem; display: flex; align-items: center; gap: 0.75rem; box-shadow: 0 2px 8px var(--shadow); }
        .logo { font-size: 1.75rem; font-weight: 700; color: white; display: flex; align-items: center; gap: 0.5rem; }
        .logo::before { content: "🍳"; font-size: 2rem; }

        .main-content { padding: 2rem; max-width: 1400px; margin: 0 auto; }
        .page-header { margin-bottom: 2rem; }
        .page-title { font-size: 2.5rem; color: var(--primary-dark); margin-bottom: 0.5rem; }
        .page-subtitle { color: var(--text-light); font-size: 1.1rem; }

        .btn { padding: 0.75rem 1.5rem; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: all 0.2s; font-size: 0.95rem; font-family: 'DM Sans', sans-serif; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-light); transform: translateY(-1px); box-shadow: 0 4px 12px var(--shadow); }
        .btn-secondary { background: white; color: var(--primary); border: 2px solid var(--primary); }
        .btn-secondary:hover { background: var(--primary); color: white; }

        .card { background: var(--surface); border-radius: 12px; padding: 1.5rem; box-shadow: 0 2px 8px var(--shadow); margin-bottom: 1.5rem; }

        .recipe-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; margin-top: 1.5rem; }
        .recipe-card { background: var(--surface); border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px var(--shadow); transition: all 0.3s; cursor: pointer; }
        .recipe-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px var(--shadow); }
        .recipe-image { width: 100%; height: 180px; object-fit: cover; background: linear-gradient(135deg, var(--primary-light) 0%, var(--primary) 100%); }
        .recipe-content { padding: 1.25rem; }
        .recipe-name { font-size: 1.25rem; font-weight: 700; color: var(--primary-dark); margin-bottom: 0.75rem; }
        .recipe-meta { display: flex; gap: 1rem; font-size: 0.85rem; color: var(--text-light); margin-bottom: 0.5rem; flex-wrap: wrap; }
        .recipe-meta span { display: flex; align-items: center; gap: 0.25rem; }

        .input-group { margin-bottom: 1.5rem; }
        .input-label { display: block; margin-bottom: 0.5rem; font-weight: 600; color: var(--text); }
        .input-field { width: 100%; padding: 0.75rem; border: 2px solid var(--border); border-radius: 8px; font-size: 1rem; font-family: 'DM Sans', sans-serif; transition: border-color 0.2s; }
        .input-field:focus { outline: none; border-color: var(--primary); }
        textarea.input-field { min-height: 100px; resize: vertical; }

        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 2000; animation: fadeIn 0.2s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .modal { background: var(--surface); border-radius: 16px; padding: 2rem; max-width: 800px; max-height: 90vh; overflow-y: auto; width: 90%; animation: slideUp 0.3s; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        .modal-title { font-size: 2rem; color: var(--primary-dark); }
        .close-btn { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--text-light); padding: 0.25rem; }

        .badge { display: inline-block; padding: 0.25rem 0.75rem; border-radius: 20px; font-size: 0.85rem; font-weight: 600; margin-right: 0.5rem; }
        .badge-primary { background: var(--primary-light); color: white; }
        .badge-accent { background: var(--accent); color: white; }

        .nutrition-summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem; margin-top: 1rem; }
        .nutrition-item { background: var(--bg); padding: 1rem; border-radius: 8px; text-align: center; }
        .nutrition-value { font-size: 1.75rem; font-weight: 700; color: var(--primary); }
        .nutrition-label { font-size: 0.9rem; color: var(--text-light); margin-top: 0.25rem; }

        .action-buttons { display: flex; gap: 1rem; margin-top: 1.5rem; flex-wrap: wrap; }
        .search-bar { position: relative; margin-bottom: 1.5rem; }
        .search-input { width: 100%; padding: 1rem 1rem 1rem 3rem; border: 2px solid var(--border); border-radius: 12px; font-size: 1rem; }
        .search-icon { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-light); }

        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .simple-recipe-toggle { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1.5rem; padding: 1rem; background: var(--bg); border-radius: 8px; }
        .toggle-switch { position: relative; width: 50px; height: 26px; background: var(--border); border-radius: 13px; cursor: pointer; transition: background 0.3s; }
        .toggle-switch.active { background: var(--primary); }
        .toggle-slider { position: absolute; top: 3px; left: 3px; width: 20px; height: 20px; background: white; border-radius: 50%; transition: transform 0.3s; }
        .toggle-switch.active .toggle-slider { transform: translateX(24px); }

        @media (max-width: 768px) {
            .recipe-grid { grid-template-columns: 1fr; }
            .form-row { grid-template-columns: 1fr; }
            .modal { width: 95%; max-height: 85vh; }
            .main-content { padding: 1rem; }
        }

        @media print {
            .header-bar, .action-buttons, .close-btn, .page-header, .search-bar, .recipe-grid { display: none !important; }
            body, html { margin: 0 !important; padding: 0 !important; overflow: visible !important; background: white !important; }
            .modal-overlay { position: static !important; background: transparent !important; display: block !important; }
            .modal { position: static !important; max-height: none !important; overflow: visible !important; box-shadow: none !important; max-width: 19cm !important; width: 100% !important; padding: 1cm !important; margin: 0 auto !important; background: white !important; border-radius: 0 !important; }
            @page { size: A4 portrait; margin: 1cm; }
            .modal img { max-width: 8cm !important; max-height: 6cm !important; object-fit: contain !important; display: block; margin: 0 auto 0.5cm !important; }
            .modal-title { font-size: 1.5rem !important; margin-bottom: 0.3cm !important; color: #000 !important; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const SUPABASE_URL = 'https://hebuaabantmnfdxxkaif.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_xzVfo0l-eLpkP4TuUy17KQ_kLLUUScF';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function App() {
            const [recipes, setRecipes] = useState([]);

            const loadRecipes = async () => {
                const { data } = await supabase.from('recipes').select('*');
                if (data) setRecipes(data);
            };

            useEffect(() => { loadRecipes(); }, []);

            return (
                <div>
                    <div className="header-bar">
                        <div className="logo">RecipeFlow</div>
                    </div>
                    <div className="main-content">
                        <Recipes recipes={recipes} setRecipes={setRecipes} reload={loadRecipes} />
                    </div>
                </div>
            );
        }

        function Recipes({ recipes, setRecipes, reload }) {
            const [showModal, setShowModal] = useState(false);
            const [editingRecipe, setEditingRecipe] = useState(null);
            const [searchTerm, setSearchTerm] = useState('');
            const [viewingRecipe, setViewingRecipe] = useState(null);
            const [selectedCollection, setSelectedCollection] = useState('all');
            const [selectedKeyword, setSelectedKeyword] = useState('');

            const allCollections = [...new Set(recipes.flatMap(r => r.collections || []))].sort();

            const filteredRecipes = recipes.filter(r => {
                const matchesSearch = !searchTerm ||
                    r.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    (r.keywords && r.keywords.some(k => k.toLowerCase().includes(searchTerm.toLowerCase())));
                const matchesCollection = selectedCollection === 'all' ||
                    (r.collections && r.collections.includes(selectedCollection));
                const matchesKeyword = !selectedKeyword ||
                    (r.keywords && r.keywords.includes(selectedKeyword));
                return matchesSearch && matchesCollection && matchesKeyword;
            });

            const getCollectionCount = (collection) => recipes.filter(r => r.collections && r.collections.includes(collection)).length;

            const handleExport = () => {
                const dataStr = JSON.stringify(recipes, null, 2);
                const dataBlob = new Blob([dataStr], { type: 'application/json' });
                const url = URL.createObjectURL(dataBlob);
                const link = document.createElement('a');
                link.href = url;
                link.download = 'recipes-export.json';
                link.click();
            };

            const handleImport = () => {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = 'application/json';
                input.onchange = async (e) => {
                    const file = e.target.files[0];
                    const text = await file.text();
                    try {
                        const importedRecipes = JSON.parse(text);
                        for (const recipe of importedRecipes) {
                            const { id, ...recipeData } = recipe;
                            await supabase.from('recipes').insert(recipeData);
                        }
                        alert('Recipes imported successfully!');
                        reload();
                    } catch (error) {
                        alert('Error importing recipes. Please check the file format.');
                    }
                };
                input.click();
            };

            const handlePasteImport = () => {
                const text = prompt('Paste your JSON text here:');
                if (!text) return;
                try {
                    const importedRecipes = JSON.parse(text);
                    (async () => {
                        for (const recipe of importedRecipes) {
                            const { id, ...recipeData } = recipe;
                            await supabase.from('recipes').insert(recipeData);
                        }
                        alert('Recipes imported successfully!');
                        reload();
                    })();
                } catch (error) {
                    alert('Error importing recipes. Please check the JSON format.');
                }
            };

            return (
                <div>
                    <div className="page-header">
                        <h1 className="page-title">Recipes</h1>
                        <p className="page-subtitle">Your personal recipe collection</p>
                    </div>

                    <div className="search-bar">
                        <span className="search-icon">🔍</span>
                        <input
                            type="text"
                            className="search-input"
                            placeholder="Search recipes by name or keywords..."
                            value={searchTerm}
                            onChange={(e) => setSearchTerm(e.target.value)}
                        />
                    </div>

                    {allCollections.length > 0 && (
                        <div className="card" style={{ marginBottom: '1.5rem' }}>
                            <div style={{ display: 'flex', flexWrap: 'wrap', gap: '0.5rem', alignItems: 'center' }}>
                                <span style={{ fontWeight: '600', marginRight: '0.5rem' }}>Collections:</span>
                                <button
                                    className={`btn ${selectedCollection === 'all' ? 'btn-primary' : 'btn-secondary'}`}
                                    onClick={() => { setSelectedCollection('all'); setSelectedKeyword(''); }}
                                    style={{ padding: '0.5rem 1rem', fontSize: '0.9rem' }}
                                >
                                    All ({recipes.length})
                                </button>
                                {allCollections.map(collection => (
                                    <button
                                        key={collection}
                                        className={`btn ${selectedCollection === collection ? 'btn-primary' : 'btn-secondary'}`}
                                        onClick={() => { setSelectedCollection(collection); setSelectedKeyword(''); }}
                                        style={{ padding: '0.5rem 1rem', fontSize: '0.9rem' }}
                                    >
                                        {collection} ({getCollectionCount(collection)})
                                    </button>
                                ))}
                            </div>
                        </div>
                    )}

                    {(selectedCollection !== 'all' || selectedKeyword || searchTerm) && (
                        <div style={{ marginBottom: '1rem', display: 'flex', gap: '0.5rem', flexWrap: 'wrap', alignItems: 'center' }}>
                            <span style={{ color: 'var(--text-light)', fontSize: '0.9rem' }}>Active filters:</span>
                            {selectedCollection !== 'all' && (
                                <span className="badge badge-primary" style={{ cursor: 'pointer' }} onClick={() => setSelectedCollection('all')}>
                                    Collection: {selectedCollection} ✕
                                </span>
                            )}
                            {selectedKeyword && (
                                <span className="badge badge-accent" style={{ cursor: 'pointer' }} onClick={() => setSelectedKeyword('')}>
                                    Keyword: {selectedKeyword} ✕
                                </span>
                            )}
                            {searchTerm && (
                                <span className="badge badge-accent" style={{ cursor: 'pointer' }} onClick={() => setSearchTerm('')}>
                                    Search: {searchTerm} ✕
                                </span>
                            )}
                            <button
                                className="btn btn-secondary"
                                onClick={() => { setSelectedCollection('all'); setSelectedKeyword(''); setSearchTerm(''); }}
                                style={{ padding: '0.25rem 0.75rem', fontSize: '0.85rem' }}
                            >
                                Clear All
                            </button>
                        </div>
                    )}

                    <div style={{ color: 'var(--text-light)', marginBottom: '1rem', fontSize: '0.95rem' }}>
                        Showing {filteredRecipes.length} of {recipes.length} recipes
                    </div>

                    <div className="action-buttons">
                        <button className="btn btn-primary" onClick={() => { setEditingRecipe(null); setShowModal(true); }}>
                            ➕ Add Recipe
                        </button>
                        <button className="btn btn-secondary" onClick={handleImport}>📥 Import File</button>
                        <button className="btn btn-secondary" onClick={handlePasteImport}>📋 Paste JSON</button>
                        <button className="btn btn-secondary" onClick={handleExport}>📤 Export</button>
                    </div>

                    <div className="recipe-grid">
                        {filteredRecipes.map(recipe => (
                            <div key={recipe.id} className="recipe-card" onClick={() => setViewingRecipe(recipe)}>
                                {recipe.image_url ? (
                                    <img src={recipe.image_url} alt={recipe.name} className="recipe-image" />
                                ) : (
                                    <div className="recipe-image" style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '3rem' }}>🍽️</div>
                                )}
                                <div className="recipe-content">
                                    <h3 className="recipe-name">{recipe.name}</h3>
                                    <div className="recipe-meta">
                                        {(recipe.prep_time || recipe.cook_time) && (
                                            <span>⏱️ {(parseInt(recipe.prep_time) || 0) + (parseInt(recipe.cook_time) || 0)} min</span>
                                        )}
                                        {recipe.nutrition?.calories ? <span>🔥 {recipe.nutrition.calories} cal</span> : null}
                                    </div>
                                    {recipe.collections && recipe.collections.length > 0 && (
                                        <div style={{ marginTop: '0.5rem' }}>
                                            {recipe.collections.map((col, idx) => <span key={idx} className="badge badge-primary">{col}</span>)}
                                        </div>
                                    )}
                                    {recipe.keywords && recipe.keywords.length > 0 && (
                                        <div style={{ marginTop: '0.5rem' }}>
                                            {recipe.keywords.map((keyword, idx) => (
                                                <span
                                                    key={idx}
                                                    className="badge badge-accent"
                                                    onClick={(e) => { e.stopPropagation(); setSelectedKeyword(keyword); setSelectedCollection('all'); }}
                                                    style={{ cursor: 'pointer' }}
                                                    title={`Filter by ${keyword}`}
                                                >
                                                    🔍 {keyword}
                                                </span>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>
                        ))}
                    </div>

                    {showModal && (
                        <RecipeModal recipe={editingRecipe} onClose={() => setShowModal(false)} onSave={reload} />
                    )}

                    {viewingRecipe && (
                        <RecipeDetailModal
                            recipe={viewingRecipe}
                            onClose={() => setViewingRecipe(null)}
                            onEdit={() => { setEditingRecipe(viewingRecipe); setViewingRecipe(null); setShowModal(true); }}
                            onDelete={async () => {
                                await supabase.from('recipes').delete().eq('id', viewingRecipe.id);
                                setViewingRecipe(null);
                                reload();
                            }}
                        />
                    )}
                </div>
            );
        }

        function RecipeModal({ recipe, onClose, onSave }) {
            const [formData, setFormData] = useState(recipe || {
                name: '', servings: 1, prep_time: null, cook_time: null, source: '', image_url: '',
                collections: [], keywords: [], ingredients: [], steps: [], notes: '',
                nutrition: { calories: 0, protein: 0, carbs: 0, fat: 0, fiber: 0, sugar: 0, salt: 0 },
                is_simple: false
            });

            const handleSave = async () => {
                try {
                    const sanitizedData = {
                        ...formData,
                        servings: parseInt(formData.servings) || 1,
                        prep_time: formData.prep_time ? parseInt(formData.prep_time) : null,
                        cook_time: formData.cook_time ? parseInt(formData.cook_time) : null,
                        collections: Array.isArray(formData.collections) ? formData.collections : [],
                        keywords: Array.isArray(formData.keywords) ? formData.keywords : [],
                        ingredients: Array.isArray(formData.ingredients) ? formData.ingredients : [],
                        steps: Array.isArray(formData.steps) ? formData.steps : [],
                        nutrition: {
                            calories: parseFloat(formData.nutrition?.calories) || 0,
                            protein: parseFloat(formData.nutrition?.protein) || 0,
                            carbs: parseFloat(formData.nutrition?.carbs) || 0,
                            fat: parseFloat(formData.nutrition?.fat) || 0,
                            fiber: parseFloat(formData.nutrition?.fiber) || 0,
                            sugar: parseFloat(formData.nutrition?.sugar) || 0,
                            salt: parseFloat(formData.nutrition?.salt) || 0
                        },
                        is_simple: Boolean(formData.is_simple)
                    };

                    if (recipe) {
                        const { error } = await supabase.from('recipes').update(sanitizedData).eq('id', recipe.id).select();
                        if (error) { alert(`Error updating recipe: ${error.message}`); return; }
                    } else {
                        const { error } = await supabase.from('recipes').insert(sanitizedData).select();
                        if (error) { alert(`Error saving recipe: ${error.message}`); return; }
                    }
                    onSave();
                    onClose();
                } catch (err) {
                    alert(`Exception: ${err.message}`);
                }
            };

            const addIngredient = () => {
                setFormData({ ...formData, ingredients: [...formData.ingredients, { item: '', amount: '' }] });
            };

            const addStep = () => {
                setFormData({ ...formData, steps: [...formData.steps, ''] });
            };

            return (
                <div className="modal-overlay" onClick={onClose}>
                    <div className="modal" onClick={(e) => e.stopPropagation()}>
                        <div className="modal-header">
                            <h2 className="modal-title">{recipe ? 'Edit Recipe' : 'Add Recipe'}</h2>
                            <button className="close-btn" onClick={onClose}>✕</button>
                        </div>

                        <div className="simple-recipe-toggle">
                            <div
                                className={`toggle-switch ${formData.is_simple ? 'active' : ''}`}
                                onClick={() => setFormData({ ...formData, is_simple: !formData.is_simple })}
                            >
                                <div className="toggle-slider"></div>
                            </div>
                            <span>Simple meal entry (no ingredients/steps needed)</span>
                        </div>

                        <div className="form-row">
                            <div className="input-group">
                                <label className="input-label">Recipe Name *</label>
                                <input className="input-field" value={formData.name} onChange={(e) => setFormData({ ...formData, name: e.target.value })} />
                            </div>
                            <div className="input-group">
                                <label className="input-label">Servings</label>
                                <input type="number" className="input-field" value={formData.servings} onChange={(e) => setFormData({ ...formData, servings: parseInt(e.target.value) })} />
                            </div>
                        </div>

                        <div className="form-row">
                            <div className="input-group">
                                <label className="input-label">Prep Time (min)</label>
                                <input type="number" className="input-field" value={formData.prep_time} onChange={(e) => setFormData({ ...formData, prep_time: e.target.value })} />
                            </div>
                            <div className="input-group">
                                <label className="input-label">Cook Time (min)</label>
                                <input type="number" className="input-field" value={formData.cook_time} onChange={(e) => setFormData({ ...formData, cook_time: e.target.value })} />
                            </div>
                        </div>

                        <div className="input-group">
                            <label className="input-label">Image URL</label>
                            <input className="input-field" value={formData.image_url} onChange={(e) => setFormData({ ...formData, image_url: e.target.value })} />
                        </div>

                        <div className="input-group">
                            <label className="input-label">Source</label>
                            <input className="input-field" value={formData.source} onChange={(e) => setFormData({ ...formData, source: e.target.value })} />
                        </div>

                        <div className="input-group">
                            <label className="input-label">Collections (comma-separated)</label>
                            <input className="input-field" value={formData.collections?.join(', ') || ''} onChange={(e) => setFormData({ ...formData, collections: e.target.value.split(',').map(s => s.trim()).filter(Boolean) })} />
                        </div>

                        <div className="input-group">
                            <label className="input-label">Keywords (comma-separated)</label>
                            <input className="input-field" value={formData.keywords?.join(', ') || ''} onChange={(e) => setFormData({ ...formData, keywords: e.target.value.split(',').map(s => s.trim()).filter(Boolean) })} />
                        </div>

                        <h3 style={{ marginTop: '1.5rem', marginBottom: '1rem' }}>Nutrition (per serving)</h3>
                        <div className="form-row">
                            <div className="input-group">
                                <label className="input-label">Calories</label>
                                <input type="number" className="input-field" value={formData.nutrition?.calories || 0} onChange={(e) => setFormData({ ...formData, nutrition: { ...formData.nutrition, calories: parseFloat(e.target.value) || 0 } })} />
                            </div>
                            <div className="input-group">
                                <label className="input-label">Protein (g)</label>
                                <input type="number" className="input-field" value={formData.nutrition?.protein || 0} onChange={(e) => setFormData({ ...formData, nutrition: { ...formData.nutrition, protein: parseFloat(e.target.value) || 0 } })} />
                            </div>
                        </div>

                        <div className="form-row">
                            <div className="input-group">
                                <label className="input-label">Carbs (g)</label>
                                <input type="number" className="input-field" value={formData.nutrition?.carbs || 0} onChange={(e) => setFormData({ ...formData, nutrition: { ...formData.nutrition, carbs: parseFloat(e.target.value) || 0 } })} />
                            </div>
                            <div className="input-group">
                                <label className="input-label">Fat (g)</label>
                                <input type="number" className="input-field" value={formData.nutrition?.fat || 0} onChange={(e) => setFormData({ ...formData, nutrition: { ...formData.nutrition, fat: parseFloat(e.target.value) || 0 } })} />
                            </div>
                        </div>

                        <div className="form-row">
                            <div className="input-group">
                                <label className="input-label">Fiber (g)</label>
                                <input type="number" className="input-field" value={formData.nutrition?.fiber || 0} onChange={(e) => setFormData({ ...formData, nutrition: { ...formData.nutrition, fiber: parseFloat(e.target.value) || 0 } })} />
                            </div>
                            <div className="input-group">
                                <label className="input-label">Sugar (g)</label>
                                <input type="number" className="input-field" value={formData.nutrition?.sugar || 0} onChange={(e) => setFormData({ ...formData, nutrition: { ...formData.nutrition, sugar: parseFloat(e.target.value) || 0 } })} />
                            </div>
                        </div>

                        <div className="input-group">
                            <label className="input-label">Salt (mg)</label>
                            <input type="number" className="input-field" value={formData.nutrition?.salt || 0} onChange={(e) => setFormData({ ...formData, nutrition: { ...formData.nutrition, salt: parseFloat(e.target.value) || 0 } })} />
                        </div>

                        {!formData.is_simple && (
                            <React.Fragment>
                                <h3 style={{ marginTop: '1.5rem', marginBottom: '1rem' }}>Ingredients</h3>
                                {formData.ingredients?.map((ing, idx) => (
                                    <div key={idx} className="form-row" style={{ marginBottom: '0.5rem' }}>
                                        <input
                                            className="input-field"
                                            placeholder="Amount"
                                            value={ing.amount}
                                            onChange={(e) => {
                                                const newIngs = [...formData.ingredients];
                                                newIngs[idx].amount = e.target.value;
                                                setFormData({ ...formData, ingredients: newIngs });
                                            }}
                                        />
                                        <input
                                            className="input-field"
                                            placeholder="Item"
                                            value={ing.item}
                                            onChange={(e) => {
                                                const newIngs = [...formData.ingredients];
                                                newIngs[idx].item = e.target.value;
                                                setFormData({ ...formData, ingredients: newIngs });
                                            }}
                                        />
                                    </div>
                                ))}
                                <button className="btn btn-secondary" onClick={addIngredient} style={{ marginTop: '0.5rem' }}>+ Add Ingredient</button>

                                <h3 style={{ marginTop: '1.5rem', marginBottom: '1rem' }}>Steps</h3>
                                {formData.steps?.map((step, idx) => (
                                    <div key={idx} className="input-group">
                                        <textarea
                                            className="input-field"
                                            placeholder={`Step ${idx + 1}`}
                                            value={step}
                                            onChange={(e) => {
                                                const newSteps = [...formData.steps];
                                                newSteps[idx] = e.target.value;
                                                setFormData({ ...formData, steps: newSteps });
                                            }}
                                        />
                                    </div>
                                ))}
                                <button className="btn btn-secondary" onClick={addStep}>+ Add Step</button>
                            </React.Fragment>
                        )}

                        <div className="input-group" style={{ marginTop: '1.5rem' }}>
                            <label className="input-label">Notes</label>
                            <textarea className="input-field" value={formData.notes} onChange={(e) => setFormData({ ...formData, notes: e.target.value })} />
                        </div>

                        <div className="action-buttons">
                            <button className="btn btn-primary" onClick={handleSave}>Save Recipe</button>
                            <button className="btn btn-secondary" onClick={onClose}>Cancel</button>
                        </div>
                    </div>
                </div>
            );
        }

        function RecipeDetailModal({ recipe, onClose, onEdit, onDelete }) {
            const [servings, setServings] = useState(recipe.servings || 1);

            const scaleAmount = (amount) => {
                const multiplier = servings / (recipe.servings || 1);
                const match = amount.match(/(\d+\.?\d*)/);
                if (match) {
                    const num = parseFloat(match[1]);
                    const scaled = (num * multiplier).toFixed(2).replace(/\.?0+$/, '');
                    return amount.replace(match[1], scaled);
                }
                return amount;
            };

            const handlePrint = () => {
                const printWindow = window.open('', '', 'width=800,height=600');
                const ingredientsHtml = (!recipe.is_simple && recipe.ingredients && recipe.ingredients.length > 0)
                    ? '<div class="ingredients-section"><h3>Ingredients</h3><div class="servings-info">For ' + servings + ' servings</div><ul>' +
                      recipe.ingredients.map(function(ing) { return '<li><strong>' + scaleAmount(ing.amount) + '</strong> ' + ing.item + '</li>'; }).join('') +
                      '</ul></div>'
                    : '';
                const stepsHtml = (!recipe.is_simple && recipe.steps && recipe.steps.length > 0)
                    ? '<div class="instructions-section"><h3>Instructions</h3><ol>' +
                      recipe.steps.map(function(step) { return '<li>' + step + '</li>'; }).join('') +
                      '</ol></div>'
                    : '';
                const metaHtml = (recipe.prep_time ? '<span>⏱️ Prep: ' + recipe.prep_time + ' min</span>' : '') +
                    (recipe.cook_time ? '<span>🍳 Cook: ' + recipe.cook_time + ' min</span>' : '') +
                    (recipe.source ? '<span>📚 ' + recipe.source + '</span>' : '');
                const headerHtml = (recipe.image_url || recipe.notes)
                    ? '<div class="header-section">' +
                      (recipe.image_url ? '<img src="' + recipe.image_url + '" alt="' + recipe.name + '">' : '<div></div>') +
                      (recipe.notes ? '<div class="notes-box"><h3>Notes</h3><p>' + recipe.notes + '</p></div>' : '<div></div>') +
                      '</div>'
                    : '';

                const printCss = '* { margin: 0; padding: 0; box-sizing: border-box; } body { font-family: Arial, sans-serif; padding: 0.8cm; max-width: 19cm; margin: 0 auto; color: #000; font-size: 10pt; line-height: 1.4; } h1 { font-size: 1.5rem; margin-bottom: 0.4cm; color: #1a5f3d; border-bottom: 2px solid #1a5f3d; padding-bottom: 0.2cm; } .meta { font-size: 0.9rem; color: #666; margin-bottom: 0.5cm; } .meta span { margin-right: 1rem; } .header-section { display: grid; grid-template-columns: 6cm 1fr; gap: 0.6cm; margin-bottom: 0.6cm; } .header-section img { width: 100%; height: auto; max-height: 5cm; object-fit: cover; border-radius: 4px; } .notes-box { background: #f9f9f9; padding: 0.5cm; border-radius: 4px; border-left: 3px solid #1a5f3d; } .notes-box h3 { font-size: 1rem; margin-bottom: 0.3cm; color: #1a5f3d; } .ingredients-section { margin-bottom: 0.8cm; page-break-after: always; min-height: 12cm; } .instructions-section { page-break-before: always; } h3 { font-size: 1.2rem; margin-bottom: 0.4cm; color: #1a5f3d; border-bottom: 1px solid #1a5f3d; padding-bottom: 0.15cm; } .servings-info { font-size: 0.9rem; color: #666; margin-bottom: 0.4cm; font-style: italic; } ul { padding-left: 0; list-style: none; } ul li { padding: 0.25cm 0; border-bottom: 0.5px solid #eee; font-size: 0.95rem; } ol { padding-left: 1.2cm; } ol li { margin-bottom: 0.5cm; font-size: 0.95rem; line-height: 1.5; } @page { size: A4 portrait; margin: 0.8cm; }';

                const printContent = '<!DOCTYPE html><html><head><title>' + recipe.name + '</title><style>' + printCss + '</style></head><body><h1>' + recipe.name + '</h1><div class="meta">' + metaHtml + '</div>' + headerHtml + ingredientsHtml + stepsHtml + '</body></html>';

                printWindow.document.write(printContent);
                printWindow.document.close();
                printWindow.onload = function() {
                    printWindow.print();
                    printWindow.onafterprint = function() { printWindow.close(); };
                };
            };

            const handleDuplicate = async () => {
                try {
                    const { id, created_at, updated_at, ...recipeCopy } = recipe;
                    recipeCopy.name = recipe.name + ' (Copy)';
                    const { error } = await supabase.from('recipes').insert(recipeCopy).select();
                    if (error) { alert('Error duplicating recipe: ' + error.message); return; }
                    alert('Recipe duplicated successfully as "' + recipeCopy.name + '"');
                    onClose();
                    window.location.reload();
                } catch (err) {
                    alert('Exception: ' + err.message);
                }
            };

            return (
                <div className="modal-overlay" onClick={onClose}>
                    <div className="modal" onClick={(e) => e.stopPropagation()}>
                        <div className="modal-header">
                            <h2 className="modal-title">{recipe.name}</h2>
                            <button className="close-btn" onClick={onClose} style={{ fontSize: '2rem', padding: '0.5rem' }}>✕</button>
                        </div>

                        <div className="action-buttons" style={{ marginTop: 0, marginBottom: '1rem' }}>
                            <button className="btn btn-secondary" onClick={(e) => { e.stopPropagation(); onClose(); }} style={{ width: '100%' }}>← Back to Recipes</button>
                        </div>

                        {recipe.image_url && <img src={recipe.image_url} alt={recipe.name} style={{ width: '100%', borderRadius: '8px', marginBottom: '1rem' }} />}

                        <div className="recipe-meta" style={{ fontSize: '1rem', marginBottom: '1rem' }}>
                            {recipe.prep_time && <span>⏱️ Prep: {recipe.prep_time} min</span>}
                            {recipe.cook_time && <span>🍳 Cook: {recipe.cook_time} min</span>}
                            {recipe.source && <span>📚 {recipe.source}</span>}
                        </div>

                        {recipe.nutrition && (
                            <div className="card" style={{ marginBottom: '1rem' }}>
                                <h3 style={{ marginBottom: '0.5rem' }}>Nutrition (per serving)</h3>
                                <div className="nutrition-summary">
                                    <div className="nutrition-item"><div className="nutrition-value">{recipe.nutrition.calories}</div><div className="nutrition-label">Calories</div></div>
                                    <div className="nutrition-item"><div className="nutrition-value">{recipe.nutrition.protein}g</div><div className="nutrition-label">Protein</div></div>
                                    <div className="nutrition-item"><div className="nutrition-value">{recipe.nutrition.carbs}g</div><div className="nutrition-label">Carbs</div></div>
                                    <div className="nutrition-item"><div className="nutrition-value">{recipe.nutrition.fat}g</div><div className="nutrition-label">Fat</div></div>
                                    {recipe.nutrition.fiber > 0 ? <div className="nutrition-item"><div className="nutrition-value">{recipe.nutrition.fiber}g</div><div className="nutrition-label">Fiber</div></div> : null}
                                    {recipe.nutrition.sugar > 0 ? <div className="nutrition-item"><div className="nutrition-value">{recipe.nutrition.sugar}g</div><div className="nutrition-label">Sugar</div></div> : null}
                                    {recipe.nutrition.salt > 0 ? <div className="nutrition-item"><div className="nutrition-value">{recipe.nutrition.salt}mg</div><div className="nutrition-label">Salt</div></div> : null}
                                </div>
                            </div>
                        )}

                        {!recipe.is_simple && recipe.ingredients && recipe.ingredients.length > 0 && (
                            <div className="ingredients-section" style={{ marginBottom: '1.5rem' }}>
                                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1rem' }}>
                                    <h3>Ingredients</h3>
                                    <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem' }}>
                                        <label>Servings:</label>
                                        <input
                                            type="number"
                                            value={servings}
                                            onChange={(e) => setServings(parseInt(e.target.value) || 1)}
                                            style={{ width: '60px', padding: '0.25rem', borderRadius: '4px', border: '2px solid var(--border)' }}
                                        />
                                    </div>
                                </div>
                                <ul style={{ listStyle: 'none' }}>
                                    {recipe.ingredients.map((ing, idx) => (
                                        <li key={idx} style={{ padding: '0.5rem 0', borderBottom: '1px solid var(--border)' }}>
                                            <strong>{scaleAmount(ing.amount)}</strong> {ing.item}
                                        </li>
                                    ))}
                                </ul>
                            </div>
                        )}

                        {!recipe.is_simple && recipe.steps && recipe.steps.length > 0 && (
                            <div className="steps-section" style={{ marginBottom: '1.5rem' }}>
                                <h3 style={{ marginBottom: '1rem' }}>Instructions</h3>
                                <ol style={{ paddingLeft: '1.5rem' }}>
                                    {recipe.steps.map((step, idx) => <li key={idx} style={{ marginBottom: '1rem' }}>{step}</li>)}
                                </ol>
                            </div>
                        )}

                        {recipe.notes && (
                            <div style={{ marginBottom: '1.5rem' }}>
                                <h3 style={{ marginBottom: '0.5rem' }}>Notes</h3>
                                <p style={{ color: 'var(--text-light)' }}>{recipe.notes}</p>
                            </div>
                        )}

                        <div className="action-buttons">
                            <button className="btn btn-primary" onClick={(e) => { e.stopPropagation(); onEdit(); }}>✏️ Edit</button>
                            <button className="btn btn-secondary" onClick={(e) => { e.stopPropagation(); handleDuplicate(); }}>📋 Duplicate</button>
                            <button className="btn btn-secondary" onClick={(e) => { e.stopPropagation(); handlePrint(); }}>🖨️ Print</button>
                            <button className="btn btn-secondary" onClick={(e) => { e.stopPropagation(); onDelete(); }} style={{ background: 'var(--error)', color: 'white' }}>🗑️ Delete</button>
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
